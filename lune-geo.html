        </select>
        {canRemove && <button className="lg-col__rm" title="Remove" onClick={onRemove}><Glyph name="x" size={13} /></button>}
      </div>
      <span className="lg-pill lg-col__pill" style={{ background: `color-mix(in srgb, ${region.color} 16%, transparent)`, color: region.color }}>{region.label}</span>

      <div className="lg-col__kpis">
        {kpis.map(([l, v]) => <div key={l} className="lg-col__kpi"><span>{l}</span><b>{v}</b></div>)}
      </div>

      <div className="lg-col__lbl">Spend by category</div>
      <div className="lg-catbars lg-catbars--cmp">
        {c.cats.map((x) => {
          const m = LuneGeo.CATEGORIES[x.cat];
          return (
            <div key={x.cat} className="lg-catbar">
              <CatIcon cat={x.cat} size={14} />
              <span className="lg-catbar__name">{m.label}</span>
              <div className="lg-catbar__track"><span style={{ width: (x.share * 100) + "%", background: m.color }} /></div>
              <span className="lg-catbar__pct">{Math.round(x.share * 100)}%</span>
            </div>
          );
        })}
      </div>

      <div className="lg-col__lbl">Demographics</div>
      <div className="lg-col__demo">
        <div className="lg-col__demostat"><b>{s.avgAge}</b><span>avg age</span></div>
        <div className="lg-col__demostat"><b>{s.female}%</b><span>female</span></div>
        <div className="lg-col__demostat"><b>{s.topNat.name}</b><span>top nat.</span></div>
      </div>
      <div className="lg-demo__age">
        {c.demo.age.map((a) => (
          <div key={a.band} className="lg-agecol">
            <div className="lg-agecol__bar"><span style={{ height: Math.round(a.share / maxAge * 100) + "%" }} /></div>
            <div className="lg-agecol__pct">{Math.round(a.share * 100)}</div>
            <div className="lg-agecol__band">{a.band}</div>
          </div>
        ))}
      </div>

      <div className="lg-col__lbl">Top brands</div>
      <div className="lg-col__brands">
        {c.merchants.slice(0, 3).map((mch, i) => (
          <div key={i} className="lg-col__brand">
            <BrandLogo name={mch.name} color={LuneGeo.CATEGORIES[mch.cat].color} size={26} />
            <span className="nm">{mch.name}</span><span className="amt">{fmtBig(mch.volume)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ComparePage({ cities, onSetCities, home }) {
  const setAt = (i, id) => { const n = cities.slice(); n[i] = id; onSetCities(n); };
  const rm = (i) => onSetCities(cities.filter((_, j) => j !== i));
  const add = () => { const a = LuneGeo.CITIES.find((c) => !cities.includes(c.id)); onSetCities([...cities, a ? a.id : LuneGeo.CITIES[0].id]); };
  return (
    <div className="lg-page">
      <div className="lg-page__head">
        <div><div className="lg-eyebrow">Enrich · Cross-border</div><div className="lg-page__title">Compare cities</div></div>
        {cities.length < 4 && <button className="lg-chip" onClick={add}><Glyph name="plus" size={15} />Add city</button>}
      </div>
      <div className="lg-cmpscroll">
        <div className="lg-cmpgrid" style={{ gridTemplateColumns: `repeat(${cities.length}, minmax(248px, 1fr))` }}>
          {cities.map((id, i) => (
            <CompareColumn key={i} id={id} home={home} onChange={(v) => setAt(i, v)} onRemove={() => rm(i)} canRemove={cities.length > 2} />
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Segments ---------------- */
function buildSaved() {
  const mk = (name, cityId, market, focus, status) => {
    const c = LuneGeo.CITIES.find((x) => x.id === cityId);
    return { id: name, name, city: c, market, focus, status, size: c.uniqueCards, spend: LuneGeo.effVol(c, market === "All" ? "all" : market) };
  };
  return [
    mk("Luxury shoppers · London", "c6", "UAE", "Shopping spend", "Active"),
    mk("Frequent travellers · East Asia", "c18", "All", "Travel spend", "Active"),
    mk("Fine dining · Paris", "c8", "All", "Dining spend", "Paused"),
    mk("Maldives holidaymakers", "c27", "UAE", "Travel spend", "Active"),
  ];
}

function SegmentDetail({ seg }) {
  const c = seg.city;
  const avgPer = Math.round(seg.spend / Math.max(seg.size, 1));
  const kpis = [["Cardholders", fmtNum(seg.size)], ["Est. spend · 90d", fmtBig(seg.spend)], ["Avg / cardholder", fmtUSD(avgPer)], ["Match confidence", "94%"]];
  return (
    <section className="lg-segdetail">
      <div className="lg-segdetail__head">
        <div>
          <div className="lg-segdetail__status"><span className={"lg-segstatus " + seg.status.toLowerCase()}>{seg.status}</span></div>
          <div className="lg-page__title">{seg.name}</div>
        </div>
        <div className="lg-seg-actions">
          <button className="lg-btn lg-btn--ghost"><Glyph name="download" size={15} />Export</button>
          <button className="lg-btn lg-btn--primary"><Glyph name="sparkle" size={15} />{seg.status === "Draft" ? "Create segment" : "Activate"}</button>
        </div>
      </div>

      <div className="lg-segchips">
        <span className="lg-chip2"><i style={{ background: LuneGeo.REGIONS[c.region].color }} />Destination · {c.city}</span>
        <span className="lg-chip2">Home market · {seg.market}</span>
        <span className="lg-chip2">Focus · {seg.focus}</span>
      </div>

      <div className="lg-segkpis">
        {kpis.map(([l, v]) => <div key={l} className="lg-segkpi"><span>{l}</span><b>{v}</b></div>)}
      </div>

      <div className="lg-segfoot">Built from enriched cross-border transactions · Updated daily · Last sync 06:00 GST</div>

      <div className="lg-segcols">
        <div className="lg-segcard"><Demographics city={c} /></div>
        <div className="lg-segcard">
          <div className="lg-demo__title"><Glyph name="tag" size={15} />Top brands in segment</div>
          <div className="lg-brands">
            {c.merchants.map((mch, i) => {
              const col = LuneGeo.CATEGORIES[mch.cat].color;
              return (
                <div key={i} className="lg-brandrow">
                  <BrandLogo name={mch.name} color={col} size={36} />
                  <div className="lg-brandrow__main">
                    <div className="lg-brandrow__top"><span className="lg-brandrow__name">{mch.name}</span><span className="lg-brandrow__amt">{fmtBig(mch.volume)}</span></div>
                    <div className="lg-brandrow__bottom"><span className="lg-brandrow__meta">{LuneGeo.CATEGORIES[mch.cat].label} · {Math.round(mch.share * 100)}%</span><MiniBars data={mch.trend} height={26} color={col} /></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </section>
  );
}

function SegmentBuilder({ onClose, onCreate }) {
  const cities = _useMemo(() => [...LuneGeo.CITIES].filter((c) => !c.domestic).sort((a, b) => a.city.localeCompare(b.city)), []);
  const cats = _useMemo(() => Object.entries(LuneGeo.CATEGORIES).map(([k, v]) => [k, v.label]), []);
  const [cityId, setCityId] = _useState(cities[0].id);
  const [market, setMarket] = _useState("All");
  const [cat, setCat] = _useState(cats[0][0]);
  const [nm, setNm] = _useState("");
  const c = cities.find((x) => x.id === cityId);
  const homeKey = market === "All" ? "all" : market;
  const autoName = "Cardholders spending in " + c.city;
  const focus = LuneGeo.CATEGORIES[cat].label + " spend";

  function create() {
    onCreate({
      id: "new-" + Date.now(),
      name: nm.trim() || autoName,
      city: c, market, focus, status: "Draft",
      size: c.uniqueCards, spend: LuneGeo.effVol(c, homeKey),
    });
  }

  return (
    <div className="lg-modal" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="lg-modal__card" role="dialog" aria-modal="true" aria-label="New segment">
        <div className="lg-modal__head">
          <div>
            <div className="lg-eyebrow">Audiences</div>
            <div className="lg-modal__title">New segment</div>
          </div>
          <button className="lg-modal__x" onClick={onClose} aria-label="Close">
            <Glyph name="plus" size={16} style={{ transform: "rotate(45deg)" }} />
          </button>
        </div>

        <label className="lg-modal__lab" htmlFor="sb-name">Segment name</label>
        <input id="sb-name" className="lg-modal__input" value={nm} placeholder={autoName}
               onChange={(e) => setNm(e.target.value)} />

        <label className="lg-modal__lab" htmlFor="sb-city">Destination city</label>
        <select id="sb-city" className="lg-modal__input" value={cityId} onChange={(e) => setCityId(e.target.value)}>
          {cities.map((x) => <option key={x.id} value={x.id}>{x.city} · {x.country}</option>)}
        </select>

        <label className="lg-modal__lab">Home market</label>
        <div className="lg-modal__seg">
          {["All", "UAE", "KSA"].map((m) => (
            <button key={m} className={market === m ? "is-active" : ""} onClick={() => setMarket(m)}>{m === "All" ? "All markets" : m}</button>
          ))}
        </div>

        <label className="lg-modal__lab" htmlFor="sb-focus">Spend focus</label>
        <select id="sb-focus" className="lg-modal__input" value={cat} onChange={(e) => setCat(e.target.value)}>
          {cats.map(([k, lbl]) => <option key={k} value={k}>{lbl} spend</option>)}
        </select>

        <div className="lg-modal__preview">
          <div><span>Est. cardholders</span><b>{fmtNum(c.uniqueCards)}</b></div>
          <div><span>Est. spend · 90d</span><b>{fmtBig(LuneGeo.effVol(c, homeKey))}</b></div>
        </div>

        <div className="lg-modal__foot">
          <button className="lg-btn lg-btn--ghost" onClick={onClose}>Cancel</button>
          <button className="lg-btn lg-btn--primary" onClick={create}><Glyph name="sparkle" size={15} />Create draft</button>
        </div>
      </div>
    </div>
  );
}

function SegmentsPage({ draft }) {
  const saved = _useMemo(buildSaved, []);
  const [created, setCreated] = _useState([]);
  const all = [...(draft ? [draft] : []), ...created, ...saved];
  const [selId, setSelId] = _useState(draft ? draft.id : saved[0].id);
  const [q, setQ] = _useState("");
  const [building, setBuilding] = _useState(false);
  _useEffect(() => { if (draft) setSelId(draft.id); }, [draft]);
  _useEffect(() => {
    if (!building) return;
    const fn = (e) => { if (e.key === "Escape") setBuilding(false); };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [building]);
  const seg = all.find((s) => s.id === selId) || all[0];

  const shown = q ? all.filter((s) => (s.name + " " + s.city.city + " " + s.focus).toLowerCase().includes(q.toLowerCase())) : all;
  const GROUPS = [["Draft", "Drafts"], ["Active", "Active"], ["Paused", "Paused"]];
  const activeN = all.filter((s) => s.status === "Active").length;

  return (
    <div className="lg-page">
      <header className="lg-page__head lg-seghead">
        <div>
          <div className="lg-eyebrow">Audiences</div>
          <div className="lg-page__title">Segments</div>
          <div className="lg-page__sub">{all.length} segments · {activeN} active · built from cross-border spend</div>
        </div>
        <button className="lg-btn lg-btn--primary" onClick={() => setBuilding(true)}>
          <Glyph name="plus" size={15} />New segment
        </button>
      </header>

      {building && (
        <SegmentBuilder
          onClose={() => setBuilding(false)}
          onCreate={(seg) => { setCreated((p) => [seg, ...p]); setSelId(seg.id); setBuilding(false); }}
        />
      )}

      <div className="lg-page--split lg-page--split-inner">
        <aside className="lg-seglist">
          <div className="lg-segsearch">
            <Glyph name="search" size={14} />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search segments" aria-label="Search segments" />
          </div>
          {GROUPS.map(([st, label]) => {
            const items = shown.filter((s) => s.status === st);
            if (!items.length) return null;
            return (
              <div key={st} className="lg-seggroup">
                <div className="lg-seggroup__lab">{label} · {items.length}</div>
                {items.map((s) => (
                  <button key={s.id} className={"lg-segitem" + (s.id === selId ? " is-active" : "")} onClick={() => setSelId(s.id)}>
                    <span className="lg-catdot" style={{ background: LuneGeo.REGIONS[s.city.region].color }} />
                    <div className="lg-segitem__b"><span className="nm">{s.name}</span><span className="mt">{s.city.city} · {fmtNum(s.size)} cardholders</span></div>
                  </button>
                ))}
              </div>
            );
          })}
          {!shown.length && <div className="lg-seggroup__empty">No segments match &ldquo;{q}&rdquo;</div>}
        </aside>
        <SegmentDetail seg={seg} />
      </div>
    </div>
  );
}

/* ---------------- Empty placeholder ---------------- */
function EmptyPage({ icon, title, sub }) {
  return (
    <div className="lg-page lg-empty">
      <div className="lg-empty__box">
        <Glyph name={icon} size={30} stroke />
        <div className="lg-empty__t">{title}</div>
        <div className="lg-empty__s">{sub}</div>
      </div>
    </div>
  );
}

Object.assign(window, { ComparePage, SegmentsPage, EmptyPage, buildSaved });

</script>
<script type="text/babel" data-presets="react">
/* ============================================================
   Lune Geo — map engine + app (cross-border spend, B2B)
   ============================================================ */

const HOME_BOUNDS = L.latLngBounds(LuneGeo.CITIES.map((c) => [c.lat, c.lng])).pad(0.08);

const TILES = {
  dark:  { url: "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
           labels: "https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png" },
  light: { url: "https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
           labels: "https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png" },
};
const ATTR = '&copy; <a href="https://carto.com/">CARTO</a> · &copy; OpenStreetMap';

const VOLS = LuneGeo.CITIES.map((c) => c.volume);
const VMIN = Math.sqrt(Math.min(...VOLS)), VMAX = Math.sqrt(Math.max(...VOLS));
function diaFor(v) {
  const n = (Math.sqrt(Math.max(v, 1)) - VMIN) / (VMAX - VMIN || 1);
  return Math.round(13 + Math.max(0, n) * 34);
}

function bubbleHTML(color, dia, selected, pulse) {
  const ring = (selected && pulse) ? `<span class="lg-pin__ring" style="width:${dia}px;height:${dia}px"></span>` : "";
  return `<div class="lg-bub${selected ? " is-selected" : ""}">${ring}
    <span class="lg-bub__glow" style="width:${dia}px;height:${dia}px;background:${color};color:${color}"></span>
    <span class="lg-bub__core" style="width:${Math.max(6, dia * 0.34)}px;height:${Math.max(6, dia * 0.34)}px;background:${color}"></span>
  </div>`;
}

function arcPoints(a, b, bend = 0.18, n = 64) {
  const mid = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  const dLat = b[0] - a[0], dLng = b[1] - a[1];
  const dist = Math.hypot(dLat, dLng) || 1;
  let perp = [-dLng / dist, dLat / dist];
  if (perp[0] < 0) perp = [-perp[0], -perp[1]];
  const cp = [mid[0] + perp[0] * bend * dist, mid[1] + perp[1] * bend * dist];
  const out = [];
  for (let i = 0; i <= n; i++) {
    const t = i / n, u = 1 - t;
    out.push([u * u * a[0] + 2 * u * t * cp[0] + t * t * b[0], u * u * a[1] + 2 * u * t * cp[1] + t * t * b[1]]);
  }
  return out;
}

function MapCanvas({ items, vizMode, home, theme, accent, selectedId, pulse, panelSide, onSelect, onReady }) {
  const elRef = useRef(null), mapRef = useRef(null), baseRef = useRef(null), labelRef = useRef(null), layersRef = useRef([]);
  const propsRef = useRef({});
  propsRef.current = { panelSide, onSelect };

  useEffect(() => {
    const map = L.map(elRef.current, {
      zoomControl: false, attributionControl: true, worldCopyJump: true,
      zoomSnap: 1, zoomDelta: 1, minZoom: 2, maxZoom: 12, preferCanvas: false,
      zoomAnimation: false, markerZoomAnimation: false, fadeAnimation: false,
    });
    map.fitBounds(HOME_BOUNDS, { padding: [30, 30] });
    L.control.attribution({ prefix: false }).addTo(map);
    mapRef.current = map; window.__geoMap = map;
    // The container's final size isn't settled on first paint (fonts/layout),
    // so the initial fitBounds clamps to maxZoom. Keep refitting to the world
    // view on every resize until the user first interacts with the map.
    let autoFit = true;
    const ro = new ResizeObserver(() => {
      map.invalidateSize();
      if (autoFit) map.fitBounds(HOME_BOUNDS, { padding: [30, 30] });
    });
    ro.observe(elRef.current);
    const stopAutoFit = () => { autoFit = false; };
    ["wheel", "mousedown", "touchstart"].forEach((ev) =>
      elRef.current.addEventListener(ev, stopAutoFit, { once: true, passive: true }));
    const onResize = () => map.invalidateSize();
    window.addEventListener("resize", onResize);
    const focus = (id) => {
      const c = LuneGeo.CITIES.find((x) => x.id === id); if (!c) return;
      const tz = Math.max(map.getZoom(), 5);
      const pt = map.project([c.lat, c.lng], tz);
      pt.x += (propsRef.current.panelSide === "right" ? 180 : -180);
      map.setView(map.unproject(pt, tz), tz, { animate: true, duration: 0.6 });
    };
    onReady({
      zoom: (d) => map.setZoom(Math.round(map.getZoom()) + d),
      reset: () => map.fitBounds(HOME_BOUNDS, { padding: [30, 30], animate: true, duration: 0.6 }),
      focus,
    });
    return () => { ro.disconnect(); window.removeEventListener("resize", onResize); map.remove(); };
  }, []);

  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    const t = TILES[theme];
    if (baseRef.current) map.removeLayer(baseRef.current);
    if (labelRef.current) map.removeLayer(labelRef.current);
    baseRef.current = L.tileLayer(t.url, { subdomains: "abcd", maxZoom: 20, attribution: ATTR }).addTo(map);
    labelRef.current = L.tileLayer(t.labels, { subdomains: "abcd", maxZoom: 20, pane: "shadowPane", opacity: 0.85 }).addTo(map);
  }, [theme]);

  useEffect(() => {
    const map = mapRef.current; if (!map) return;
    layersRef.current.forEach((l) => map.removeLayer(l));
    layersRef.current = [];
    const push = (l) => { l.addTo(map); layersRef.current.push(l); };

    if (vizMode === "heat") {
      const pts = items.map((it) => {
        const n = (Math.sqrt(Math.max(it.value, 1)) - VMIN) / (VMAX - VMIN || 1);
        return [it.lat, it.lng, 0.45 + Math.max(0, n) * 0.55];
      });
      push(L.heatLayer(pts, {
        radius: 55, blur: 32, max: 1.0, maxZoom: 9, minOpacity: 0.5,
        gradient: { 0.15: "rgba(58,82,180,0.5)", 0.35: "#5468C9", 0.55: "#9B5DE0", 0.72: "#F2607A", 0.86: "#FF7A45", 1: "#FFE08A" },
      }));
      return;
    }

    const marker = (it, dia) => {
      const sel = it.id === selectedId;
      const m = L.marker([it.lat, it.lng], {
        icon: L.divIcon({ className: "lg-bub-wrap", html: bubbleHTML(it.color, dia, sel, pulse), iconSize: [dia, dia], iconAnchor: [dia / 2, dia / 2] }),
        riseOnHover: true, zIndexOffset: sel ? 1000 : Math.round(dia),
      });
      m.bindTooltip(
        `<div class="lg-tip__name">${it.city}<span style="color:${it.color}"> · ${it.country}</span></div>
         <div class="lg-tip__sub">${fmtBig(it.value)} · ${it.topCat}-led</div>`,
        { className: "lg-tip", direction: "top", offset: [0, -dia / 2 - 2], opacity: 1 });
      m.on("click", () => propsRef.current.onSelect(it.id));
      return m;
    };

    if (vizMode === "flows") {
      const activeOrigins = home === "all" ? ["UAE", "KSA"] : [home];
      items.filter((it) => !it.domestic).forEach((it) => {
        activeOrigins.forEach((ok) => {
          const ov = home === "all" ? it.value * (ok === "UAE" ? it.uaeShare : 1 - it.uaeShare) : it.value;
          const n = (Math.sqrt(Math.max(ov, 1)) - VMIN) / (VMAX - VMIN || 1);
          const o = LuneGeo.ORIGINS[ok];
          const pts = arcPoints([o.lat, o.lng], [it.lat, it.lng]);
          const w = 1 + Math.max(0, n) * 4;
          // base arc (faint, steady) + bright comet dash on top
          push(L.polyline(pts, {
            className: "lg-flow-base", color: it.color, weight: w + 1.5, opacity: 0.16, lineCap: "round",
          }));
          push(L.polyline(pts, {
            className: "lg-flow", color: it.color, weight: w, opacity: 0.65, lineCap: "round",
          }));
        });
      });
      items.filter((it) => !it.domestic).forEach((it) => push(marker(it, Math.max(14, diaFor(it.value) * 0.6))));
      activeOrigins.forEach((ok) => {
        const o = LuneGeo.ORIGINS[ok];
        push(L.marker([o.lat, o.lng], {
          icon: L.divIcon({ className: "lg-hub-wrap", html:
            `<div class="lg-hub"><span class="lg-hub__pulse"></span><span class="lg-hub__core"></span></div><span class="lg-hub__label">${o.city}</span>`,
            iconSize: [18, 18], iconAnchor: [9, 9] }), zIndexOffset: 2000,
        }));
      });
      return;
    }

    items.forEach((it) => push(marker(it, diaFor(it.value))));
  }, [items, vizMode, home, selectedId, accent, pulse]);

  return <div id="map" ref={elRef} />;
}

/* ---------------- App ---------------- */
// Brand-color presets — neutral slate default; banks pick their own.
const BRANDS = ["#2F8C82", "#10A37F", "#475569", "#1E3A8A", "#3852B4", "#8C2F39"];
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "#2F8C82",
  "panelSide": "right",
  "density": "comfortable",
  "pulse": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [query, setQuery] = useState("");
  const [vizMode, setVizMode] = useState("bubbles");
  const [lens, setLens] = useState("region");
  const [home, setHome] = useState("all");
  const [activeRegions, setActiveRegions] = useState(() => new Set(LuneGeo.REGION_ORDER));
  const [activeCats, setActiveCats] = useState(() => new Set(LuneGeo.CAT_ORDER));
  const [activeBrands, setActiveBrands] = useState(() => new Set(LuneGeo.BRANDS.map((b) => b.name)));
  const [demographics, setDemographics] = useState(true);
  const [selectedId, setSelectedId] = useState(null);
  const [page, setPage] = useState("map");
  const [compareCities, setCompareCities] = useState(["c6", "c8", "c18"]);
  const [draftSegment, setDraftSegment] = useState(null);
  const apiRef = useRef(null);

  useEffect(() => {
    const fn = (e) => { if (e.data && e.data.type === "lg-nav" && e.data.page) setPage(e.data.page); };
    window.addEventListener("message", fn);
    return () => window.removeEventListener("message", fn);
  }, []);

  const accentSoft = `color-mix(in srgb, ${t.accent} 16%, transparent)`;
  const active = lens === "region" ? activeRegions : lens === "category" ? activeCats : activeBrands;

  const queryMatched = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return LuneGeo.CITIES;
    return LuneGeo.CITIES.filter((c) =>
      c.city.toLowerCase().includes(q) || c.country.toLowerCase().includes(q) ||
      LuneGeo.REGIONS[c.region].label.toLowerCase().includes(q));
  }, [query]);

  // list items (regions or categories) with volumes for the panel
  const listItems = useMemo(() => {
    if (lens === "region") {
      const vol = {};
      queryMatched.forEach((c) => { vol[c.region] = (vol[c.region] || 0) + LuneGeo.effVol(c, home); });
      return LuneGeo.REGION_ORDER.map((r) => ({ key: r, label: LuneGeo.REGIONS[r].label, color: LuneGeo.REGIONS[r].color, vol: vol[r] || 0 }));
    }
    if (lens === "category") {
      const vol = {};
      queryMatched.forEach((c) => { LuneGeo.CAT_ORDER.forEach((cat) => { vol[cat] = (vol[cat] || 0) + LuneGeo.catVol(c, cat, home); }); });
      return LuneGeo.CAT_ORDER.map((cat) => ({ key: cat, cat, label: LuneGeo.CATEGORIES[cat].label, color: LuneGeo.CATEGORIES[cat].color, vol: vol[cat] || 0 }))
        .filter((x) => x.vol > 0).sort((a, b) => b.vol - a.vol);
    }
    const vol = {};
    queryMatched.forEach((c) => { LuneGeo.BRANDS.forEach((b) => { vol[b.name] = (vol[b.name] || 0) + LuneGeo.brandVol(c, b.name, home); }); });
    return LuneGeo.BRANDS.map((b) => ({ key: b.name, brand: true, name: b.name, cat: b.cat, color: b.color, label: b.name, vol: vol[b.name] || 0 }))
      .filter((x) => x.vol > 0).sort((a, b) => b.vol - a.vol);
  }, [lens, queryMatched, home]);

  // map items: value + color per city under current lens
  const items = useMemo(() => {
    const out = [];
    queryMatched.forEach((c) => {
      let value, color;
      if (lens === "region") {
        if (!activeRegions.has(c.region)) return;
        value = LuneGeo.effVol(c, home);
        color = LuneGeo.REGIONS[c.region].color;
      } else if (lens === "category") {
        value = 0; let best = null, bv = -1;
        activeCats.forEach((cat) => {
          const v = LuneGeo.catVol(c, cat, home);
          value += v;
          if (v > bv) { bv = v; best = cat; }
        });
        if (value <= 0 || !best) return;
        color = LuneGeo.CATEGORIES[best].color;
      } else {
        value = 0; let best = null, bv = -1;
        activeBrands.forEach((name) => {
          const v = LuneGeo.brandVol(c, name, home);
          if (v > 0) { value += v; if (v > bv) { bv = v; best = name; } }
        });
        if (value <= 0 || !best) return;
        color = LuneGeo.BRAND_BY_NAME[best].color;
      }
      out.push({ id: c.id, lat: c.lat, lng: c.lng, domestic: c.domestic, uaeShare: c.uaeShare, value, color, city: c.city, country: c.country, topCat: LuneGeo.CATEGORIES[c.cats[0].cat].label });
    });
    return out;
  }, [lens, queryMatched, home, activeRegions, activeCats, activeBrands]);

  const stats = useMemo(() => {
    let volume = 0, txns = 0, intl = 0; const countries = new Set();
    items.forEach((it) => {
      volume += it.value; countries.add(it.country);
      const c = LuneGeo.CITIES.find((x) => x.id === it.id);
      const full = LuneGeo.effVol(c, home) || 1;
      txns += LuneGeo.effTxns(c, home) * (it.value / full);
      if (!it.domestic) intl += it.value;
    });
    return { volume, txns, countries: countries.size, intlPct: volume ? (intl / volume) * 100 : 0 };
  }, [items, home]);

  useEffect(() => {
    if (selectedId && !items.some((it) => it.id === selectedId)) setSelectedId(null);
  }, [items, selectedId]);
  useEffect(() => {
    if (vizMode === "flows" && selectedId) {
      const c = LuneGeo.CITIES.find((x) => x.id === selectedId);
      if (c && c.domestic) setSelectedId(null);
    }
  }, [vizMode, selectedId]);

  const selected = useMemo(() => LuneGeo.CITIES.find((c) => c.id === selectedId) || null, [selectedId]);

  const onToggle = (key) => {
    if (lens === "region") setActiveRegions((p) => { const n = new Set(p); n.has(key) ? n.delete(key) : n.add(key); return n; });
    else if (lens === "category") setActiveCats((p) => { const n = new Set(p); n.has(key) ? n.delete(key) : n.add(key); return n; });
    else setActiveBrands((p) => { const n = new Set(p); n.has(key) ? n.delete(key) : n.add(key); return n; });
  };
  const onAll = () => lens === "region" ? setActiveRegions(new Set(LuneGeo.REGION_ORDER)) : lens === "category" ? setActiveCats(new Set(LuneGeo.CAT_ORDER)) : setActiveBrands(new Set(LuneGeo.BRANDS.map((b) => b.name)));
  const onClear = () => lens === "region" ? setActiveRegions(new Set()) : lens === "category" ? setActiveCats(new Set()) : setActiveBrands(new Set());

  const onSelect = (id) => { setSelectedId(id); if (apiRef.current) setTimeout(() => apiRef.current.focus(id), 70); };

  const onBuildSegment = (c) => {
    setDraftSegment({
      id: "draft", name: `Cardholders spending in ${c.city}`, city: c,
      market: home === "all" ? "All" : home,
      focus: LuneGeo.CATEGORIES[c.cats[0].cat].label + " spend",
      status: "Draft", size: c.uniqueCards, spend: LuneGeo.effVol(c, home),
    });
    setPage("segments");
  };

  const panelSide = t.panelSide;
  const filtersSide = panelSide === "right" ? "left" : "right";

  return (
    <div className={"lg-app density-" + t.density} data-theme="light"
      style={{ "--lg-accent": t.accent, "--lg-accent-soft": accentSoft }}>
      <Sidebar page={page} onNav={setPage} />
      <div className="lg-main">
        {page === "map" && (
          <>
            <TopBar query={query} onQuery={setQuery} stats={stats} theme={t.theme}
              onToggleTheme={() => setTweak("theme", t.theme === "dark" ? "light" : "dark")} />
            <div className="lg-stage">
              <MapCanvas items={items} vizMode={vizMode} home={home} theme="light" accent={t.accent}
                selectedId={selectedId} pulse={t.pulse} panelSide={panelSide}
                onSelect={onSelect} onReady={(api) => (apiRef.current = api)} />

              <FilterPanel side={filtersSide} vizMode={vizMode} onViz={setVizMode}
                lens={lens} onLens={setLens} home={home} onHome={setHome}
                listItems={listItems} active={active} onToggle={onToggle} onAll={onAll} onClear={onClear}
                demographics={demographics} onDemographics={setDemographics} />

              <ZoomControls side={filtersSide}
                onZoom={(d) => apiRef.current && apiRef.current.zoom(d)}
                onReset={() => apiRef.current && apiRef.current.reset()} />

              {!selected && (
                <div className="lg-card lg-hint" style={{ [panelSide]: 16 }}>
                  <Glyph name="globe" size={15} />
                  {vizMode === "flows"
                    ? "Click a destination to see what's flowing there — by category & brand"
                    : "Select a city to inspect enriched spend"}
                </div>
              )}

              <CityDetail side={panelSide} city={selected} home={home} demographics={demographics}
                onBuild={onBuildSegment} onClose={() => setSelectedId(null)} />
            </div>
          </>
        )}

        {page === "compare" && <ComparePage cities={compareCities} onSetCities={setCompareCities} home={home} />}
        {page === "segments" && <SegmentsPage draft={draftSegment} />}
        {page === "cardholders" && <EmptyPage icon="card" title="Cardholders" sub="Cohort profiles & lifecycle — coming soon" />}
        {page === "enrich" && <EmptyPage icon="sparkle" title="Enrich" sub="Transaction enrichment pipeline & coverage — coming soon" />}
      </div>

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Brand color" value={t.accent} options={BRANDS} onChange={(v) => setTweak("accent", v)} />
        <TweakToggle label="Pulse selected city" value={t.pulse} onChange={(v) => setTweak("pulse", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Detail panel" value={t.panelSide} options={["left", "right"]} onChange={(v) => setTweak("panelSide", v)} />
        <TweakRadio label="Density" value={t.density} options={["comfortable", "compact"]} onChange={(v) => setTweak("density", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
