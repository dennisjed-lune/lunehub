<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Lune Geo · Merchant Map</title>

<!-- Leaflet + plugins (CDN) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<!-- Fonts: Plus Jakarta Sans (workhorse) + Cormorant Garamond (display) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&display=swap">

<style>
/* ===== Lune design tokens (colors, typography, spacing, base) ===== */
/* ============================================================
   Lune — Color tokens
   ------------------------------------------------------------
   Source of truth: Lune UI Library + Category Icons (Figma) and
   the Lune logo suite. Primary is emerald #10A37F (the crescent),
   anchored by deep teal #002E2A and the near-black "ink" #070312.
   ============================================================ */

:root {
  /* ---- Brand core ---- */
  --lune-emerald:      #10A37F;  /* primary — the crescent / accent */
  --lune-teal:         #002E2A;  /* deep forest teal — wordmark, dark surfaces */
  --lune-teal-700:     #0A634D;  /* mid teal — category-icon green */
  --lune-mint:         #99F2AC;  /* bright mint — success, highlights */
  --lune-ink:          #070312;  /* near-black aubergine — dark canvas */
  --lune-sea:          #469A93;  /* muted sea green — secondary accent */

  /* ---- Emerald ramp (primary, from Figma opacity steps) ---- */
  --primary-100:       #10A37F;
  --primary-90:        rgba(16,163,127,0.90);
  --primary-80:        rgba(16,163,127,0.80);
  --primary-70:        rgba(16,163,127,0.70);
  --primary-60:        rgba(16,163,127,0.60);
  --primary-50:        rgba(16,163,127,0.50);
  --primary-40:        rgba(16,163,127,0.40);
  --primary-30:        rgba(16,163,127,0.30);
  --primary-20:        rgba(16,163,127,0.20);
  --primary-10:        rgba(16,163,127,0.10);

  /* ---- Neutral ramp (cool, faintly teal-tinted greys) ---- */
  --neutral-0:         #FFFFFF;
  --neutral-25:        #F7F9F8;
  --neutral-50:        #EEF2F1;
  --neutral-100:       #E2E8E6;
  --neutral-200:       #C9D3D0;
  --neutral-300:       #A7B4B0;
  --neutral-400:       #7E8E89;
  --neutral-500:       #5C6B66;
  --neutral-600:       #44524E;
  --neutral-700:       #2E3A36;
  --neutral-800:       #1B2421;
  --neutral-900:       #0E1513;
  --neutral-950:       #070312;

  /* ---- Status (from the Figma status-pill set) ---- */
  --status-success:    #99F2AC;  /* "Completed" */
  --status-success-ink:#063D1B;
  --status-warning:    #FBDA7D;  /* "Under Review" */
  --status-warning-ink:#5A4205;
  --status-info:       #5A9CB5;  /* informational (category palette) */
  --status-info-ink:   #0C3543;
  --status-error:      #F26076;  /* declined / error (category palette) */
  --status-error-ink:  #5C0C18;

  /* ---- Category accent hues (from Category Icons "Colours") ---- */
  --cat-dining:        #FF7444;
  --cat-grocery:       #E76F2E;
  --cat-shopping:      #F26076;
  --cat-wellness:      #F49BAB;
  --cat-transport:     #5A9CB5;
  --cat-travel:        #6F8F72;
  --cat-financial:     #3852B4;
  --cat-savings:       #A594F9;
  --cat-income:        #0A634D;
  --cat-household:     #C4A484;
  --cat-student:       #B7BDF7;
  --cat-misc:          #758A93;

  /* ============================================================
     Semantic aliases — light theme (default)
     ============================================================ */
  --bg-canvas:         var(--neutral-25);
  --bg-surface:        var(--neutral-0);
  --bg-raised:         var(--neutral-0);
  --bg-sunken:         var(--neutral-50);
  --bg-inverse:        var(--lune-ink);

  --surface-card:      var(--neutral-0);
  --surface-muted:     var(--neutral-50);
  --surface-emerald:   var(--primary-10);

  --text-primary:      var(--lune-teal);
  --text-secondary:    var(--neutral-600);
  --text-tertiary:     var(--neutral-400);
  --text-on-emerald:   var(--neutral-0);
  --text-on-inverse:   var(--neutral-0);
  --text-link:         var(--lune-emerald);

  --border-subtle:     var(--neutral-100);
  --border-default:    var(--neutral-200);
  --border-strong:     var(--neutral-300);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #0E9173;
  --accent-press:      #0B7C62;
  --focus-ring:        rgba(16,163,127,0.35);
}

/* ============================================================
   Dark theme — set data-theme="dark" on a wrapper or <html>
   The Lune cover/cover-page use the ink canvas with white type
   and emerald accents.
   ============================================================ */
[data-theme="dark"] {
  --bg-canvas:         var(--lune-ink);
  --bg-surface:        #110B1F;
  --bg-raised:         #181023;
  --bg-sunken:         #0B0716;
  --bg-inverse:        var(--neutral-0);

  --surface-card:      #14101F;
  --surface-muted:     #1B1528;
  --surface-emerald:   rgba(16,163,127,0.16);

  --text-primary:      var(--neutral-0);
  --text-secondary:    #B8B2C4;
  --text-tertiary:     #7C7689;
  --text-on-emerald:   var(--lune-ink);
  --text-on-inverse:   var(--lune-teal);
  --text-link:         var(--lune-mint);

  --border-subtle:     rgba(255,255,255,0.08);
  --border-default:    rgba(255,255,255,0.14);
  --border-strong:     rgba(255,255,255,0.24);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #2BB996;
  --accent-press:      #46A893;
  --focus-ring:        rgba(153,242,172,0.40);
}

/* ============================================================
   Lune — Typography tokens
   ------------------------------------------------------------
   Type scale lifted directly from the Lune UI Library type spec.
   Body family: Plus Jakarta Sans. Display: Cormorant Garamond
   (Bold Italic — reserved for hero / editorial moments).
   Every step is set at 150% line-height per the spec, except the
   display face which runs tight at 100%.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-display: "Cormorant Garamond", ui-serif, Georgia,
                  "Times New Roman", serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* ---- Weights ---- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold:600;
  --weight-bold:    700;
  --weight-extra:   800;

  /* ---- Type scale (px) — name : size / line-height ---- */
  --text-h1-size: 36px;   --text-h1-lh: 1.5;
  --text-h2-size: 32px;   --text-h2-lh: 1.5;
  --text-h3-size: 28px;   --text-h3-lh: 1.5;
  --text-h4-size: 24px;   --text-h4-lh: 1.5;
  --text-h5-size: 20px;   --text-h5-lh: 1.5;
  --text-title1-size: 18px; --text-title1-lh: 1.5;
  --text-title2-size: 16px; --text-title2-lh: 1.5;
  --text-body-size: 14px; --text-body-lh: 1.5;
  --text-caption-size: 12px; --text-caption-lh: 1.5;

  /* Display (Cormorant Garamond, Bold Italic, tight) */
  --text-display-size: 88px; --text-display-lh: 1.0;

  /* ---- Letter-spacing ---- */
  --tracking-tight: -0.02em;   /* large sans headings + hero */
  --tracking-normal: 0;
  --tracking-wide: 0.04em;     /* uppercase pill / eyebrow labels */
}

/* ============================================================
   Type helper classes — apply directly or use as reference.
   ============================================================ */
.lune-display {
  font-family: var(--font-display);
  font-weight: var(--weight-bold);
  font-style: italic;
  font-size: var(--text-display-size);
  line-height: var(--text-display-lh);
  letter-spacing: var(--tracking-tight);
}
.lune-h1 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h1-size); line-height: var(--text-h1-lh); letter-spacing: var(--tracking-tight); }
.lune-h2 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h2-size); line-height: var(--text-h2-lh); letter-spacing: var(--tracking-tight); }
.lune-h3 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h3-size); line-height: var(--text-h3-lh); }
.lune-h4 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h4-size); line-height: var(--text-h4-lh); }
.lune-h5 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h5-size); line-height: var(--text-h5-lh); }
.lune-title1 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title1-size); line-height: var(--text-title1-lh); }
.lune-title2 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title2-size); line-height: var(--text-title2-lh); }
.lune-body { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-body-size); line-height: var(--text-body-lh); }
.lune-caption { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-caption-size); line-height: var(--text-caption-lh); }
.lune-eyebrow { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-caption-size); line-height: 1; letter-spacing: var(--tracking-wide);
  text-transform: uppercase; }

/* ============================================================
   Lune — Spacing, radius, elevation & motion tokens
   ------------------------------------------------------------
   Spacing is a 4px base scale (Figma gaps observed: 8/20/24/32/48/64).
   Radii run from tight inputs up to the fully-rounded status pills
   (the Figma pills use a 72px radius = effectively pill-shaped).
   ============================================================ */

:root {
  /* ---- Spacing (4px base) ---- */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;

  /* ---- Radii ---- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   12px;   /* default control / card radius */
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-2xl:  32px;
  --radius-pill: 999px;  /* status pills, chips, avatars */

  /* ---- Border widths ---- */
  --border-hairline: 1px;
  --border-thick:    1.5px;

  /* ---- Elevation — soft, cool-toned shadows (teal-tinted) ---- */
  --shadow-xs:  0 1px 2px rgba(7,3,18,0.06);
  --shadow-sm:  0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04);
  --shadow-md:  0 4px 12px rgba(7,3,18,0.08), 0 2px 4px rgba(7,3,18,0.04);
  --shadow-lg:  0 12px 32px rgba(7,3,18,0.12), 0 4px 8px rgba(7,3,18,0.05);
  --shadow-xl:  0 24px 64px rgba(7,3,18,0.16);
  --shadow-emerald: 0 8px 24px rgba(16,163,127,0.28);

  /* ---- Motion ---- */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);   /* @kind other */
  --ease-emphasis: cubic-bezier(0.3, 0.7, 0, 1); /* @kind other */
  --ease-out:      cubic-bezier(0, 0, 0.2, 1);   /* @kind other */
  --dur-fast:   120ms;  /* @kind other */
  --dur-base:   200ms;  /* @kind other */
  --dur-slow:   320ms;  /* @kind other */

  /* ---- Layout ---- */
  --container-max: 1200px;
  --container-prose: 680px;
}

/* ============================================================
   Lune — base / reset layer
   A light, opinionated normalize that wires the brand defaults
   onto bare HTML. Optional for consumers but keeps specimens and
   UI kits consistent.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: var(--text-body-size);
  line-height: var(--text-body-lh);
  font-weight: var(--weight-regular);
  color: var(--text-primary);
  background: var(--bg-canvas);
}

h1, h2, h3, h4, h5, h6, p, figure { margin: 0; }

a { color: var(--text-link); text-decoration: none; }
a:hover { text-decoration: underline; }

::selection { background: var(--lune-mint); color: var(--lune-teal); }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-xs);
}

img, svg { display: block; max-width: 100%; }

code, pre, kbd { font-family: var(--font-mono); }


/* ===== App chrome (app.css) ===== */
/* ============================================================
   Lune Geo — application chrome
   All values resolve to Lune design tokens. Theme flips via
   [data-theme="dark"] on .lg-app (tokens handle the rest).
   ============================================================ */

.lg-app {
  position: fixed; inset: 0;
  display: flex;
  background: var(--bg-canvas);
  color: var(--text-primary);
  font-family: var(--font-sans);
  --lg-accent: var(--lune-emerald);
  --lg-accent-soft: rgba(16,163,127,0.14);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ---------------- Left rail ---------------- */
.lg-rail {
  width: 64px; flex: none;
  background: var(--lune-ink);
  display: flex; flex-direction: column; align-items: center;
  padding: 16px 0;
  gap: 6px;
  z-index: 1200;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.lg-rail__logo { width: 34px; height: 34px; margin-bottom: 18px; display:block; }
.lg-rail__btn {
  width: 40px; height: 40px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.55);
  background: transparent; border: none; cursor: pointer;
  transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);
  position: relative;
}
.lg-rail__btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
.lg-rail__btn.is-active { color: #fff; background: var(--lg-accent-soft); }
.lg-rail__btn.is-active::before {
  content: ""; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 22px; border-radius: 0 3px 3px 0; background: var(--lg-accent);
}
.lg-rail__btn svg { width: 20px; height: 20px; }
.lg-rail__spacer { flex: 1; }
.lg-rail__avatar {
  width: 34px; height: 34px; border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--lune-emerald), var(--lune-sea));
  color: #fff; font-weight: 700; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}

/* ---------------- Main column ---------------- */
.lg-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ---------------- Top bar ---------------- */
.lg-topbar {
  height: 64px; flex: none;
  display: flex; align-items: center; gap: 20px;
  padding: 0 20px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  z-index: 900;
}
.lg-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.lg-title { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.1; color: var(--text-primary); }
.lg-topbar__title { display: flex; flex-direction: column; gap: 2px; flex: none; }
.lg-title { white-space: nowrap; }

.lg-search {
  flex: 1; max-width: 360px;
  display: flex; align-items: center; gap: 10px;
  height: 40px; padding: 0 14px;
  background: var(--bg-sunken);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-secondary);
  transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.lg-search:focus-within { border-color: var(--lg-accent); box-shadow: 0 0 0 3px var(--focus-ring); }
.lg-search input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--font-sans); font-size: 14px; color: var(--text-primary);
}
.lg-search input::placeholder { color: var(--text-tertiary); }
.lg-search svg { width: 16px; height: 16px; flex: none; color: var(--text-tertiary); }

.lg-chip {
  display: inline-flex; align-items: center; gap: 8px;
  height: 40px; padding: 0 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  font-size: 13px; font-weight: 600; color: var(--text-secondary);
  cursor: pointer; white-space: nowrap;
  transition: border-color var(--dur-fast), background var(--dur-fast);
}
.lg-chip:hover { border-color: var(--border-strong); }
.lg-chip svg { width: 15px; height: 15px; color: var(--text-tertiary); }
.lg-chip strong { color: var(--text-primary); font-weight: 700; }

.lg-topbar__spacer { flex: 1; }

/* stat cluster */
.lg-stats { display: flex; align-items: stretch; gap: 0; }
.lg-stat { display: flex; flex-direction: column; gap: 1px; padding: 0 18px; position: relative; }
.lg-stat + .lg-stat::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 1px; background: var(--border-subtle);
}
.lg-stat__val { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary); font-variant-numeric: tabular-nums; line-height: 1.2; }
.lg-stat__lbl { font-size: 11px; color: var(--text-tertiary); font-weight: 600; }

/* responsive topbar: shed stats before clipping */
@media (max-width: 1340px) { .lg-stat:nth-child(4) { display: none; } }
@media (max-width: 1180px) { .lg-stat:nth-child(3) { display: none; } .lg-search { max-width: 260px; } }
@media (max-width: 1010px) { .lg-stats { display: none; } }
.lg-delta { font-size: 11px; font-weight: 700; }
.lg-delta.up { color: var(--lune-emerald); }
.lg-delta.down { color: var(--status-error); }

.lg-iconbtn {
  width: 40px; height: 40px; flex: none;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); border: 1px solid var(--border-default);
  background: var(--bg-surface); color: var(--text-secondary); cursor: pointer;
  transition: border-color var(--dur-fast), color var(--dur-fast), background var(--dur-fast);
}
.lg-iconbtn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.lg-iconbtn svg { width: 18px; height: 18px; }

/* ---------------- Map stage ---------------- */
.lg-stage { position: relative; flex: 1; overflow: hidden; }
#map { position: absolute; inset: 0; background: var(--bg-sunken); }

/* Overlay cards */
.lg-card {
  background: color-mix(in srgb, var(--bg-surface) 92%, transparent);
  -webkit-backdrop-filter: blur(14px) saturate(1.2);
  backdrop-filter: blur(14px) saturate(1.2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
}

/* Filter / legend panel */
.lg-filters {
  position: absolute; top: 16px; width: 268px; z-index: 600;
  padding: 16px;
  max-height: calc(100% - 184px); /* leave room for zoom stack below */
  display: flex; flex-direction: column;
  overflow-y: auto; overscroll-behavior: contain;
}
.lg-filters.side-left { left: 16px; }
.lg-filters.side-right { right: 16px; }

.lg-seg { display: flex; gap: 4px; padding: 4px; background: var(--bg-sunken); border-radius: var(--radius-md); }
.lg-seg button {
  flex: 1; height: 32px; border: none; background: transparent; cursor: pointer;
  border-radius: var(--radius-sm); font-family: var(--font-sans);
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background var(--dur-fast), color var(--dur-fast), box-shadow var(--dur-fast);
}
.lg-seg button svg { width: 14px; height: 14px; }
.lg-seg button.is-active { background: var(--bg-surface); color: var(--text-primary); box-shadow: var(--shadow-xs); }

.lg-sectlabel {
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--text-tertiary); margin: 18px 0 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.lg-sectlabel button { border: none; background: none; cursor: pointer; font-family: var(--font-sans);
  font-size: 11px; font-weight: 700; color: var(--lg-accent); text-transform: none; letter-spacing: 0; }

.lg-catlist { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; margin: 0 -6px; padding: 0 6px; flex: 1 1 auto; min-height: 40px; max-height: 300px; }
.lg-catrow {
  display: flex; align-items: center; gap: 10px;
  height: 36px; padding: 0 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background var(--dur-fast);
}
.lg-catrow:hover { background: var(--bg-sunken); }
.lg-catrow.is-off { opacity: 0.4; }
.lg-catdot { width: 12px; height: 12px; border-radius: 4px; flex: none; }

.lg-segkpi span { font-size: 11px; color: var(--text-tertiary); font-weight: 600; }
.lg-segkpi b { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.lg-segcols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
.lg-segcard { background: var(--bg-canvas); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 4px 0; }
.lg-segcard .lg-demo { margin: 12px; }
.lg-segcard .lg-demo::before { display: none; }
.lg-segcard > .lg-demo__title { padding: 14px 16px 4px; }
@media (max-width: 1100px) { .lg-segcols { grid-template-columns: 1fr; } .lg-page--split { grid-template-columns: 260px 1fr; } }

/* Map zoom controls (custom) */
.lg-zoom { position: absolute; bottom: 24px; z-index: 600; display: flex; flex-direction: column; gap: 8px; }
.lg-zoom.side-left { left: 16px; }
.lg-zoom.side-right { right: 16px; }
.lg-zoom button {
  width: 40px; height: 40px; border: 1px solid var(--border-subtle);
  background: color-mix(in srgb, var(--bg-surface) 92%, transparent);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  color: var(--text-primary); cursor: pointer; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md);
  transition: background var(--dur-fast);
}
.lg-zoom button:hover { background: var(--bg-surface); }
.lg-zoom button svg { width: 18px; height: 18px; }
.lg-zoom .pair { display: flex; flex-direction: column; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); }
.lg-zoom .pair button { border-radius: 0; box-shadow: none; }
.lg-zoom .pair button:first-child { border-bottom: none; }

/* ---------------- Merchant detail panel ---------------- */
.lg-detail {
  position: absolute; top: 16px; bottom: 16px; width: 372px; z-index: 700;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.lg-detail.side-right { right: 16px; }
.lg-detail.side-left { left: 16px; }
/* Hidden state must not depend on an animation timeline: hard-hide. */
.lg-detail.is-hidden { display: none; }
/* Transform-only entrance from a small offset — a frozen timeline leaves the
   panel 24px offset but fully visible (never opacity-hidden or offscreen). */
@media (prefers-reduced-motion: no-preference) {
  .lg-detail.side-right:not(.is-hidden) { animation: lg-slide-r 0.4s var(--ease-emphasis) backwards; }
  .lg-detail.side-left:not(.is-hidden) { animation: lg-slide-l 0.4s var(--ease-emphasis) backwards; }
}
@keyframes lg-slide-r { from { transform: translateX(24px); } }
@keyframes lg-slide-l { from { transform: translateX(-24px); } }

.lg-detail__scroll { overflow-y: auto; flex: 1; }

/* staggered entrance for panel content (visible end-state is base; animate FROM hidden) */
@media (prefers-reduced-motion: no-preference) {
  .lg-detail:not(.is-hidden) .lg-detail__scroll > * { animation: lg-rise 0.45s var(--ease-emphasis) backwards; }
  .lg-detail:not(.is-hidden) .lg-detail__scroll > *:nth-child(2) { animation-delay: 0.05s; }
  .lg-detail:not(.is-hidden) .lg-detail__scroll > *:nth-child(3) { animation-delay: 0.1s; }
  .lg-detail:not(.is-hidden) .lg-detail__scroll > *:nth-child(4) { animation-delay: 0.15s; }
  .lg-detail:not(.is-hidden) .lg-detail__scroll > *:nth-child(5) { animation-delay: 0.2s; }
  .lg-detail:not(.is-hidden) .lg-detail__scroll > *:nth-child(n+6) { animation-delay: 0.25s; }
}
@keyframes lg-rise { from { transform: translateY(10px); } }
.lg-detail__head { padding: 20px 20px 16px; position: relative; }
.lg-detail__close {
  position: absolute; top: 16px; right: 16px; width: 30px; height: 30px;
  border: none; border-radius: var(--radius-sm); background: var(--bg-sunken);
  color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.lg-detail__close:hover { background: var(--border-subtle); color: var(--text-primary); }
.lg-detail__close svg { width: 14px; height: 14px; }

.lg-merch-id { display: flex; align-items: center; gap: 14px; padding-right: 36px; }
.lg-merch-logo {
  width: 52px; height: 52px; border-radius: var(--radius-md); flex: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: #fff;
}
.lg-merch-name { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary); line-height: 1.2; }
.lg-merch-sub { font-size: 13px; color: var(--text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 8px; }

.lg-pill {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 10px; border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 600;
}
.lg-pill svg, .lg-pill .lg-catico { width: 12px; height: 12px; }

.lg-conf {
  margin: 16px 20px 0; padding: 12px 14px;
  background: var(--bg-sunken); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  display: flex; align-items: center; gap: 10px;
  font-size: 12.5px; color: var(--text-secondary);
}
.lg-conf svg { width: 16px; height: 16px; color: var(--lg-accent); flex: none; }
.lg-conf b { font-weight: 700; }

.lg-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; margin: 20px; background: var(--border-subtle);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; }
.lg-kpi { background: var(--bg-surface); padding: 14px; }
.lg-kpi__lbl { font-size: 11px; color: var(--text-tertiary); font-weight: 600; }
.lg-kpi__val { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary);
  font-variant-numeric: tabular-nums; margin-top: 4px; }

.lg-sub-h { padding: 0 20px; font-size: 13px; font-weight: 700; color: var(--text-primary);
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.lg-sub-h span { font-size: 12px; font-weight: 600; color: var(--text-tertiary); }

/* sparkline */
.lg-spark { padding: 0 20px; margin-bottom: 24px; }
.lg-spark__bars { display: flex; align-items: flex-end; gap: 6px; height: 64px; }
.lg-spark__bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--lg-accent); opacity: 0.85;
  transition: height var(--dur-slow) var(--ease-emphasis); min-height: 3px; transform-origin: bottom; }
@media (prefers-reduced-motion: no-preference) {
  .lg-spark__bar { animation: lg-grow-y 0.6s var(--ease-emphasis) backwards; }
  .lg-spark__bar:nth-child(2n) { animation-delay: 0.08s; }
  .lg-spark__bar:nth-child(3n) { animation-delay: 0.16s; }
}
.lg-spark__bar.last { opacity: 1; }
.lg-spark__axis { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-tertiary); margin-top: 6px; }

/* transactions */
.lg-txns { padding: 0 12px 8px; }
.lg-txn { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: var(--radius-sm); }
.lg-txn:hover { background: var(--bg-sunken); }
.lg-txn__av { width: 30px; height: 30px; border-radius: var(--radius-pill); flex: none;
  background: var(--bg-sunken); color: var(--text-secondary); font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; }
.lg-txn__body { flex: 1; min-width: 0; }
.lg-txn__name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.lg-txn__meta { font-size: 11px; color: var(--text-tertiary); }
.lg-txn__amt { font-size: 13px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }

.lg-status { display: inline-flex; align-items: center; gap: 5px; height: 20px; padding: 0 8px;
  border-radius: var(--radius-pill); font-size: 10.5px; font-weight: 700; }
.lg-status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.lg-status.completed { background: rgba(16,163,127,0.16); color: #0A634D; }
.lg-status.pending { background: rgba(251,218,125,0.28); color: var(--status-warning-ink); }
.lg-status.review { background: rgba(242,96,118,0.18); color: var(--status-error-ink); }
[data-theme="dark"] .lg-status.completed { color: var(--lune-mint); }
[data-theme="dark"] .lg-status.pending { color: var(--status-warning); }
[data-theme="dark"] .lg-status.review { color: #F49BAB; }

.lg-detail__foot { padding: 14px 20px; border-top: 1px solid var(--border-subtle); display: flex; gap: 10px; }
.lg-btn {
  flex: 1; height: 40px; border-radius: var(--radius-md); border: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: filter var(--dur-fast), background var(--dur-fast);
}
.lg-btn svg { width: 15px; height: 15px; }
.lg-btn--primary { background: var(--lg-accent); color: #fff; }
.lg-btn--primary:hover { filter: brightness(1.06); }
.lg-btn--ghost { background: var(--bg-sunken); color: var(--text-primary); }
.lg-btn--ghost:hover { background: var(--border-subtle); }

/* empty hint when nothing selected */
.lg-hint {
  position: absolute; bottom: 24px; z-index: 500;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; font-size: 12.5px; font-weight: 600; color: var(--text-secondary);
}
.lg-hint svg { width: 15px; height: 15px; color: var(--lg-accent); }

/* ---------------- Leaflet marker styling ---------------- */
.lg-pin { position: relative; display: flex; align-items: center; justify-content: center; }
.lg-pin__badge {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(7,3,18,0.35); border: 2px solid rgba(255,255,255,0.92);
  transition: transform var(--dur-fast) var(--ease-emphasis);
}
.lg-pin:hover .lg-pin__badge { transform: scale(1.12); }
.lg-pin__ico { background: #fff; }
.lg-pin.is-selected .lg-pin__badge {
  box-shadow: 0 0 0 4px var(--lg-accent), 0 6px 18px rgba(7,3,18,0.45);
  transform: scale(1.15);
}
.lg-pin__ring { position: absolute; border-radius: 50%; border: 2px solid var(--lg-accent); animation: lg-ping 1.6s ease-out infinite; pointer-events: none; }
@keyframes lg-ping { 0% { transform: scale(0.8); opacity: 0.7; } 100% { transform: scale(2.2); opacity: 0; } }

/* city bubbles */
.lg-bub { position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.lg-bub__glow { position: absolute; border-radius: 50%; opacity: 0.34; border: 1.5px solid currentColor;
  transition: transform var(--dur-fast) var(--ease-emphasis), opacity var(--dur-fast); }
.lg-bub__core { position: relative; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.92);
  box-shadow: 0 1px 4px rgba(7,3,18,0.4); transition: transform var(--dur-fast) var(--ease-emphasis); }
.lg-bub:hover .lg-bub__glow { transform: scale(1.18); opacity: 0.5; }
.lg-bub:hover .lg-bub__core { transform: scale(1.15); }
.lg-bub.is-selected .lg-bub__core { box-shadow: 0 0 0 3px var(--lg-accent), 0 2px 8px rgba(7,3,18,0.5); }
.lg-bub.is-selected .lg-bub__glow { opacity: 0.5; }

/* flow arcs — faint base + bright comet overlay */
.lg-flow-base { stroke-linecap: round; }
.lg-flow { stroke-dasharray: 10 26; stroke-linecap: round;
  animation: lg-flow-dash 1.1s linear infinite; }
@keyframes lg-flow-dash { to { stroke-dashoffset: -36; } }
@media (prefers-reduced-motion: reduce) {
  .lg-flow { animation: none; stroke-dasharray: none; opacity: 0.4 !important; }
  .lg-flow-base { display: none; }
}

/* origin hubs */
.lg-hub { position: relative; display: flex; align-items: center; justify-content: center; }
.lg-hub__core { width: 14px; height: 14px; border-radius: 50%; background: var(--lg-accent);
  border: 2px solid #fff; box-shadow: 0 0 12px var(--lg-accent), 0 2px 6px rgba(7,3,18,0.5); z-index: 2; }
.lg-hub__pulse { position: absolute; width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--lg-accent); animation: lg-ping 1.8s ease-out infinite; }
.lg-hub__label { position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-sans); font-size: 11px; font-weight: 700; color: #fff; white-space: nowrap;
  text-shadow: 0 1px 4px rgba(7,3,18,0.9); letter-spacing: 0.01em; pointer-events: none; }

/* cluster bubbles */
.lg-cluster {
  background: var(--lg-accent); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sans); font-weight: 700; font-size: 13px;
  box-shadow: 0 3px 12px rgba(7,3,18,0.4); border: 3px solid rgba(255,255,255,0.55);
}
[data-theme="dark"] .lg-cluster { border-color: rgba(255,255,255,0.18); }

/* Leaflet tooltip */
.leaflet-tooltip.lg-tip {
  background: var(--lune-ink); color: #fff; border: none; box-shadow: var(--shadow-lg);
  border-radius: var(--radius-sm); padding: 7px 11px; font-family: var(--font-sans);
  font-size: 12px; font-weight: 600;
}
.leaflet-tooltip.lg-tip::before { display: none; }
.lg-tip__name { font-weight: 700; }
.lg-tip__sub { font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 600; margin-top: 1px; }

.leaflet-container { font-family: var(--font-sans); background: var(--bg-sunken); }
.leaflet-control-attribution { font-size: 10px; background: rgba(255,255,255,0.6); }
[data-theme="dark"] .leaflet-control-attribution { background: rgba(7,3,18,0.5); color: rgba(255,255,255,0.5); }
[data-theme="dark"] .leaflet-control-attribution a { color: rgba(255,255,255,0.7); }

/* scrollbars */
.lg-catlist::-webkit-scrollbar, .lg-detail__scroll::-webkit-scrollbar { width: 8px; }
.lg-catlist::-webkit-scrollbar-thumb, .lg-detail__scroll::-webkit-scrollbar-thumb {
  background: var(--border-default); border-radius: 4px; }

/* density */
.lg-app.density-compact .lg-catrow { height: 31px; }
.lg-app.density-compact .lg-txn { padding: 7px 8px; }
.lg-app.density-compact .lg-kpi { padding: 11px; }


/* ===== geomap shell ===== */

  html, body { margin: 0; height: 100%; background: var(--lune-ink); overflow: hidden; }
  #root { height: 100%; }
  .leaflet-shadow-pane { z-index: 450; }

  function topCats(region, seed) {
    const r = rng(seed);
    const prof = PROFILE[region];
    const scored = Object.keys(prof).map((c) => ({ cat: c, w: prof[c] * (0.7 + r() * 0.6) }));
    scored.sort((a, b) => b.w - a.w);
    const top = scored.slice(0, 5);
    const sum = top.reduce((s, x) => s + x.w, 0);
    return top.map((x) => ({ cat: x.cat, share: x.w / sum, chg: Math.round((r() * 32 - 8) * 10) / 10 }));
  }

  const CITIES = RAW.map((row, idx) => {
    const [city, country, region, lat, lng, pop, uaeShare] = row;
    const r = rng(idx * 6151 + 17);
    const avg = AVG_TICKET[region] * (0.85 + r() * 0.3);
    const volume = Math.round(pop * pop * 78000 * (0.8 + r() * 0.45));
    const txns = Math.round(volume / avg);
    const cats = topCats(region, idx * 13 + 3);
    const brandVol = {};
    cats.forEach((x) => {
      const pool = MERCHANTS_BY_CAT[x.cat] || [];
      const catV = volume * x.share;
      const ws = pool.map((n, i) => BRAND_BY_NAME[n].pop * (0.45 + rng(idx * 137 + BRAND_BY_NAME[n].idx * 3 + i)()));
      const wsum = ws.reduce((a, b) => a + b, 0) || 1;
      pool.forEach((n, i) => { brandVol[n] = Math.round(catV * ws[i] / wsum); });
    });
    const merchants = Object.keys(brandVol)
      .map((n) => ({ name: n, cat: BRAND_BY_NAME[n].cat, volume: brandVol[n], share: brandVol[n] / volume, cards: Math.round(txns * (brandVol[n] / volume) * 0.2) }))
      .sort((a, b) => b.volume - a.volume).slice(0, 4)
      .map((m, mi) => ({ ...m, trend: Array.from({ length: 8 }, (_, w) => Math.round(m.volume / 8 * (0.6 + rng(idx * 71 + mi * 13 + w)() * 0.85))) }));
    return {
      id: "c" + idx,
      city, country, region, lat, lng,
      domestic: region === "domestic",
      uaeShare,
      volume,
      volUAE: Math.round(volume * uaeShare),
      volKSA: Math.round(volume * (1 - uaeShare)),
      txns,
      avgTicket: Math.round(avg * 100) / 100,
      uniqueCards: Math.round(txns * (0.18 + r() * 0.12)),
      change: Math.round((r() * 26 - 6) * 10) / 10,
      cats,
      brandVol,
      merchants,
      demo: demographics(idx * 17 + 9, region, country),
      trend: Array.from({ length: 8 }, (_, w) => Math.round(volume / 8 * (0.72 + rng(idx * 90 + w)() * 0.55))),
    };
  });

  function effVol(c, home) { return home === "UAE" ? c.volUAE : home === "KSA" ? c.volKSA : c.volume; }
  function effTxns(c, home) {
    const f = home === "UAE" ? c.uaeShare : home === "KSA" ? (1 - c.uaeShare) : 1;
    return Math.round(c.txns * f);
  }
  // category spend for a city (0 if not among its top categories)
  function catShare(c, cat) { const x = c.cats.find((k) => k.cat === cat); return x ? x.share : 0; }
  function catVol(c, cat, home) { return Math.round(effVol(c, home) * catShare(c, cat)); }
  function brandVol(c, name, home) {
    const f = home === "UAE" ? c.uaeShare : home === "KSA" ? (1 - c.uaeShare) : 1;
    return Math.round((c.brandVol[name] || 0) * f);
  }
  // headline demographic facts for a city
  const AGE_MID = { "18–24": 21, "25–34": 30, "35–44": 40, "45–54": 50, "55+": 60 };
  function demoSummary(c) {
    const d = c.demo;
    const avgAge = Math.round(d.age.reduce((s, a) => s + AGE_MID[a.band] * a.share, 0));
    const topAge = d.age.slice().sort((a, b) => b.share - a.share)[0];
    return { avgAge, topAge: topAge.band, female: Math.round(d.gender.female * 100), topNat: d.nationalities[0] };
  }

  window.LuneGeo = {
    CUR, CATEGORIES, CAT_ORDER, REGIONS, REGION_ORDER, ORIGINS, CITIES, BRANDS, BRAND_BY_NAME,
    effVol, effTxns, catShare, catVol, brandVol, demoSummary,
  };
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

  trend: "M3 17l6-6 4 4 8-8M21 7v5m0-5h-5",
  card: "M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6Zm2 2v2h14V8H5Zm0 5v5h14v-5H5Z",
  plane: "M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5L21 16Z",
};
function Glyph({ name, size = 18, stroke = false, style }) {
  const d = ICONS[name];
  if (stroke) {
    return (
      <svg viewBox="0 0 24 24" width={size} height={size} fill="none"
        stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" style={style}>

  }
  return <svg viewBox="0 0 24 24" width={size} height={size} fill="currentColor" style={style}><path d={d} /></svg>;
}

/* Resolve asset path — uses bundler-inlined blob URLs when present (standalone export) */
const ASSET = (path, id) => (window.__resources && window.__resources[id]) || path;

function CatIcon({ cat, size = 16, color }) {
  const meta = LuneGeo.CATEGORIES[cat];
  const src = ASSET(`assets/icons/categories/${meta.icon}.svg`, "cat_" + meta.icon);
  return (
    <span className="lg-catico" style={{
      width: size, height: size, display: "inline-block",
      background: color || meta.color,
      WebkitMask: `url("${src}") center/contain no-repeat`,

}

/* ---------------- Brand logo tile (monogram placeholder) ----------------
   Swap-in ready: drop a real <img> here when the bank supplies logo art. */
function brandInitials(name) {
  const w = name.trim().split(/\s+/);
  return (w.length > 1 ? w[0][0] + w[1][0] : name.slice(0, 2)).toUpperCase();
}
function BrandLogo({ name, color, size = 28 }) {
  return (
    <span className="lg-logo" style={{ width: size, height: size, background: color, fontSize: Math.round(size * 0.4) }}>
      {brandInitials(name)}

  );
}

/* ---------------- Formatting ---------------- */
function fmtBig(n) {
  if (n >= 1e9) return CUR + (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return CUR + (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return CUR + Math.round(n / 1e3) + "k";
  return CUR + Math.round(n).toLocaleString("en-US");
}
function fmtUSD(n) { return CUR + Math.round(n).toLocaleString("en-US"); }
function fmtNum(n) { return Math.round(n).toLocaleString("en-US"); }
function fmtPct(n) { return Math.round(n) + "%"; }

function Switch({ checked, onChange }) {
  return (
    <button className={"lg-switch" + (checked ? " on" : "")} role="switch" aria-checked={checked}

}

}

/* ---------------- Zoom controls ---------------- */
function ZoomControls({ side, onZoom, onReset }) {
  return (
    <div className={"lg-zoom side-" + side}>
      <button title="World view" onClick={onReset}><Glyph name="globe" size={18} /></button>

        <button title="Zoom out" onClick={() => onZoom(-1)}><Glyph name="minus" size={18} /></button>
      </div>
    </div>
  );
}

/* ---------------- Sparkline ---------------- */
function Sparkline({ data }) {
  const max = Math.max(...data, 1);
  return (
    <div className="lg-spark">
      <div className="lg-spark__bars">
        {data.map((v, i) => (
          <div key={i} className={"lg-spark__bar" + (i === data.length - 1 ? " last" : "")} style={{ height: (v / max * 100) + "%" }} />
        ))}
      </div>
      <div className="lg-spark__axis"><span>8 wks ago</span><span>This week</span></div>
    </div>
  );
}

/* ---------------- Mini bar chart ---------------- */
function MiniBars({ data, height = 24, color, gap = 2 }) {
  const max = Math.max(...data, 1);
  return (
    <div className="lg-minibars" style={{ height, gap }}>
      {data.map((v, i) => (
        <span key={i} style={{ height: Math.max(8, v / max * 100) + "%", background: color || "var(--lg-accent)", opacity: i === data.length - 1 ? 1 : 0.55 }} />
      ))}
    </div>
  );
}

/* ---------------- Demographics block (USP — rich) ---------------- */
function Demographics({ city }) {
  const demo = city.demo;
  const s = LuneGeo.demoSummary(city);
  const maxAge = Math.max(...demo.age.map((x) => x.share));
  return (
    <div className="lg-demo">
      <div className="lg-demo__title"><Glyph name="users" size={15} stroke />Cardholder demographics</div>

      <div className="lg-demo__lbl">Age distribution</div>

        {demo.age.map((a) => (
          <div key={a.band} className="lg-agecol">
            <div className="lg-agecol__bar"><span style={{ height: Math.round(a.share / maxAge * 100) + "%" }} /></div>
            <div className="lg-agecol__pct">{Math.round(a.share * 100)}</div>
            <div className="lg-agecol__band">{a.band}</div>

      <div className="lg-demo__lbl">Gender</div>
      <div className="lg-gender">
        <div className="lg-gender__bar"><span className="f" style={{ width: s.female + "%" }} /><span className="m" style={{ width: (100 - s.female) + "%" }} /></div>
        <div className="lg-gender__keys"><span><i className="f" />Female {s.female}%</span><span><i className="m" />Male {100 - s.female}%</span></div>
      </div>
      <div className="lg-demo__lbl">Top nationalities</div>

        {demo.nationalities.map((n) => (<span key={n.name} className="lg-nat">{n.name}<b>{Math.round(n.share * 100)}%</b></span>))}
      </div>
    </div>
  );
}

/* ---------------- City detail panel ---------------- */
function CityDetail({ side, city, home, demographics, onBuild, onClose }) {
  const c = city;
  const region = c ? LuneGeo.REGIONS[c.region] : null;
  const vol = c ? LuneGeo.effVol(c, home) : 0;
  const txns = c ? LuneGeo.effTxns(c, home) : 0;
  const up = c && c.change >= 0;
  const uaePct = c ? Math.round(c.uaeShare * 100) : 0;
  const originLabel = home === "all" ? "Gulf" : home;
  return (
    <section className={"lg-card lg-detail side-" + side + (c ? "" : " is-hidden")}>
      {c && (
        <>
          <div className="lg-detail__scroll">
            <div className="lg-detail__head">
              <button className="lg-detail__close" onClick={onClose}><Glyph name="x" size={14} /></button>
              <div className="lg-merch-id">
                <div className="lg-merch-logo" style={{ background: region.color }}>

              </div>
            </div>

            <div className="lg-conf">
              <Glyph name={c.domestic ? "region" : "globe"} size={16} />

                <span className="lg-corridor__node">{originLabel}</span>

            <div className="lg-kpis">
              <div className="lg-kpi"><div className="lg-kpi__lbl">Spend · 90d</div><div className="lg-kpi__val">{fmtBig(vol)}</div></div>
              <div className="lg-kpi"><div className="lg-kpi__lbl">Transactions</div><div className="lg-kpi__val">{fmtNum(txns)}</div></div>
              <div className="lg-kpi"><div className="lg-kpi__lbl">Avg. ticket</div><div className="lg-kpi__val">{fmtUSD(c.avgTicket)}</div></div>
              <div className="lg-kpi"><div className="lg-kpi__lbl">Cardholders</div><div className="lg-kpi__val">{fmtNum(c.uniqueCards)}</div></div>
            </div>

            {demographics && <Demographics city={c} />}

            <div className="lg-sub-h">Spend trend<span className={"lg-delta " + (up ? "up" : "down")}>{up ? "▲" : "▼"} {Math.abs(c.change)}% QoQ</span></div>
            <Sparkline data={c.trend} />

            {!c.domestic && (
              <>
                <div className="lg-sub-h">Originating market</div>
                <div className="lg-origin">
                  <div className="lg-origin__bar"><span style={{ width: uaePct + "%" }} className="uae" /><span style={{ width: (100 - uaePct) + "%" }} className="ksa" /></div>
                  <div className="lg-origin__keys"><span><i className="uae" />UAE {uaePct}%</span><span><i className="ksa" />KSA {100 - uaePct}%</span></div>
                </div>
              </>
            )}

            <div className="lg-sub-h">Category spend{!c.domestic && <span>{originLabel} → {c.city}</span>}</div>
            <div className="lg-catbars">
              {c.cats.map((x) => {
                const meta = LuneGeo.CATEGORIES[x.cat];
                const catV = LuneGeo.catVol(c, x.cat, home);
                const cu = x.chg >= 0;
                return (
                  <div key={x.cat} className="lg-catbar">
                    <CatIcon cat={x.cat} size={15} />
                    <span className="lg-catbar__name">{meta.label}</span>
                    <div className="lg-catbar__track"><span style={{ width: (x.share * 100) + "%", background: meta.color }} /></div>
                    <span className="lg-catbar__amt">{fmtBig(catV)}</span>
                    <span className={"lg-catbar__chg " + (cu ? "up" : "down")}>{cu ? "▲" : "▼"}{Math.abs(x.chg)}</span>
                  </div>
                );
              })}
            </div>

            <div className="lg-sub-h">Top brand spend<span>last 8 wks</span></div>
            <div className="lg-brands">
              {c.merchants.map((mch, i) => {
                const col = LuneGeo.CATEGORIES[mch.cat].color;
                return (
                  <div key={i} className="lg-brandrow">
                    <BrandLogo name={mch.name} color={col} size={36} />

                        <span className="lg-brandrow__name">{mch.name}</span>
                        <span className="lg-brandrow__amt">{fmtBig(mch.volume)}</span>
                      </div>
                      <div className="lg-brandrow__bottom">
                        <span className="lg-brandrow__meta">{LuneGeo.CATEGORIES[mch.cat].label} · {Math.round(mch.share * 100)}% · {fmtNum(mch.cards)} cards</span>
                        <MiniBars data={mch.trend} height={26} color={col} />
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="lg-detail__foot">
            <button className="lg-btn lg-btn--ghost"><Glyph name="download" size={15} />Export</button>
            <button className="lg-btn lg-btn--primary" onClick={() => onBuild(c)}><Glyph name="target" size={15} />Build segment</button>
          </div>
        </>
      )}
    </section>
  );
}

Object.assign(window, {
  ICONS, Glyph, CatIcon, BrandLogo, Switch, MiniBars, fmtBig, fmtUSD, fmtNum, fmtPct,
  Sidebar, TopBar, FilterPanel, ZoomControls, Sparkline, Demographics, CityDetail,
});

</script>
<script type="text/babel" data-presets="react">
/* ============================================================
   Lune Geo — secondary pages: Compare cities, Segments
   Relies on globals from components.jsx + LuneGeo data.
   ============================================================ */
const { useState: _useState, useMemo: _useMemo, useEffect: _useEffect } = React;

/* ---------------- Compare cities ---------------- */
function CompareColumn({ id, home, onChange, onRemove, canRemove }) {
  const c = LuneGeo.CITIES.find((x) => x.id === id);
  const region = LuneGeo.REGIONS[c.region];

  const s = LuneGeo.demoSummary(c);
  const maxAge = Math.max(...c.demo.age.map((a) => a.share));
  const kpis = [["Spend · 90d", fmtBig(vol)], ["Transactions", fmtNum(txns)], ["Avg. ticket", fmtUSD(c.avgTicket)], ["Cardholders", fmtNum(c.uniqueCards)]];
  return (
    <div className="lg-col">
      <div className="lg-col__head">
