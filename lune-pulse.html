    }
    if (tab === 'rejected') {
      return [merch, cb, { key: 'budget', label: 'Budget (AED)', num: true }, { key: 'rejectedOn', label: 'Rejected on' }, cat, status];
    }
    const dateCol = tab === 'live'
      ? { key: 'liveOn', label: 'Live on' }
      : { key: 'createdOn', label: 'Created on' };
    const cols = [merch, cb, { key: 'budget', label: 'Budget (AED)', num: true }, { key: 'aud', label: 'Audience', num: true }, dateCol, cat, status];
    if (searching) cols.splice(5, 0, recv);
    return cols;
  }

  function Cell({ col, c }) {
    switch (col.key) {
      case 'merch':
        return (
          <td>
            <div className="merch-cell">
              <MerchLogo c={c} />
              <div style={{ minWidth: 0 }}>
                <div className="merch-name">{c.merchant}</div>
                <div className="merch-camp">{c.campaign}</div>
              </div>
            </div>
          </td>
        );
      case 'cb': return <td><span className="cashback-val tnum">{c.cashback}%</span></td>;
      case 'budget': return <td className="num tnum">{fmtNum(c.budget)}</td>;
      case 'aud': return <td className="num tnum">{fmtNum(c.audience)}</td>;
      case 'recv': return <td className="num tnum">{abbrev(c.audience)}</td>;
      case 'activated': return <td className="num tnum">{fmtNum(c.activated || 0)}</td>;
      case 'createdOn': return <td>{c.createdOn}</td>;
      case 'liveOn': {
        const days = Math.ceil((new Date(c.end) - Date.now()) / 86400000);
        return <td>{c.liveOn}<div className="cell-sub">{days > 1 ? 'ends in ' + days + 'd' : days === 1 ? 'ends tomorrow' : 'ending today'}</div></td>;
      }
      case 'closedOn': return <td>{c.closedOn}</td>;
      case 'rejectedOn': return <td>{c.rejectedOn}</td>;
      case 'cat': return <td><CatTag cat={c.cat} /></td>;
      case 'status': return <td><StatusPill status={c.status} /></td>;
      default: return <td />;
    }
  }

  const PAGE_SIZE = 8;
  const SORT_FIELDS = { cb: 'cashback', budget: 'budget', aud: 'audience', activated: 'activated', recv: 'audience' };

  function exportCsv(rows, tab) {
    const head = ['Merchant', 'Campaign', 'Category', 'Status', 'Cashback %', 'Budget AED', 'Audience', 'Activated', 'Start', 'End'];
    const lines = [head.join(',')].concat(rows.map(c => [
      c.merchant, c.campaign, (window.PULSE.categories[c.cat] || {}).label || c.cat, c.status,
      c.cashback, c.budget, c.audience, c.activated || '', c.start, c.end
    ].map(v => '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"').join(',')));
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pulse-campaigns-' + tab + '.csv';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  }

  function ListScreen({ onOpen }) {
    const [tab, setTab] = useState('pending');
    const [query, setQuery] = useState('');
    const [page, setPage] = useState(1);
    const [sort, setSort] = useState(null);
    const counts = window.PULSE.counts;

    const searching = query.trim().length > 0;

    const rows = useMemo(() => {
      let list = window.PULSE.byStatus(tab);
      if (searching) {
        const q = query.toLowerCase();
        list = window.PULSE.campaigns.filter(c =>
          (c.merchant + ' ' + c.campaign).toLowerCase().includes(q));
      }
      if (sort) {
        const f = SORT_FIELDS[sort.key];
        list = [...list].sort((a, b) => (((a[f] || 0) - (b[f] || 0))) * (sort.dir === 'asc' ? 1 : -1));
      }
      return list;
    }, [tab, query, searching, sort]);

    const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
    const safePage = Math.min(page, totalPages);
    const pageRows = rows.slice((safePage - 1) * PAGE_SIZE, safePage * PAGE_SIZE);
    const cols = columns(tab, searching);

    function changeTab(id) { setTab(id); setPage(1); setQuery(''); setSort(null); }
    function onSearch(v) { setQuery(v); setPage(1); }
    function toggleSort(key) {
      setPage(1);
      setSort(s => (s && s.key === key)
        ? (s.dir === 'desc' ? { key, dir: 'asc' } : null)
        : { key, dir: 'desc' });
    }

    return (
      <div className="page">
        <div className="page-head">
          <div className="page-title">Campaign Manager</div>
          <div className="page-desc">Dive into real-time analytics for your ongoing campaigns and evaluate offer effectiveness.</div>
        </div>

        {/* KPI strip */}
        <div className="kpi-strip">
          {KPIS.map(k => (
            <div key={k.key} className="kpi" style={{ '--kpi-accent': k.accent }}>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value tnum">
                {String(counts[k.key]).padStart(2, '0')}
              </div>
              <div className="kpi-foot">
                <span className="kpi-dot" />
                {k.key === 'pending' && 'Awaiting your decision'}
                {k.key === 'live' && 'Matching transactions now'}
                {k.key === 'completed' && 'Signed off to date'}
                {k.key === 'rejected' && 'Returned to Lune'}
              </div>
            </div>
          ))}
        </div>

        {/* list card */}
        <div className="list-card">
          <div className="toolbar">
            <div className="tabs">
              {TABS.map(t => (
                <button key={t.id} className={'tab' + (tab === t.id && !searching ? ' active' : '')} onClick={() => changeTab(t.id)}>
                  {t.label}
                  <span className="cnt tnum">{counts[t.id]}</span>
                </button>
              ))}
            </div>
            <div className="search">
              <Icon name="search" size={16} />
              <input
                id="pulse-search"
                placeholder="Search merchant or campaign…"
                value={query}
                onChange={e => onSearch(e.target.value)}
              />
            </div>
            <button className="btn btn-ghost csv-btn" title="Export the current list as CSV"
                    onClick={() => exportCsv(rows, searching ? 'search' : tab)} disabled={rows.length === 0}>
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 2.5v7.5M8 10 5.2 7.2M8 10l2.8-2.8M3 13.5h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg>
              Export
            </button>
          </div>

          {pageRows.length === 0 ? (
            <div className="empty-state">
              <Icon name="inbox" size={44} />
              <div style={{ fontWeight: 600, color: 'var(--ink-2)' }}>No campaigns found</div>
              <div style={{ fontSize: 13, marginTop: 4 }}>
                {searching ? `Nothing matches “${query}”.` : 'This queue is empty right now.'}
              </div>
            </div>
          ) : (
            <table className="tbl">
              <thead>
                <tr>{cols.map(col => {
                  const sortable = !!SORT_FIELDS[col.key] || col.key === 'cb';
                  const active = sort && sort.key === col.key;
                  return (
                    <th key={col.key}
                        className={(col.num ? 'num' : '') + (sortable ? ' th-sort' : '') + (active ? ' th-sorted' : '')}
                        onClick={sortable ? () => toggleSort(col.key) : undefined}
                        title={sortable ? 'Sort by ' + col.label : undefined}>
                      {col.label}
                      {sortable && <span className="sort-ind">{active ? (sort.dir === 'asc' ? '\u2191' : '\u2193') : '\u2195'}</span>}
                    </th>
                  );
                })}</tr>
              </thead>
              <tbody>
                {pageRows.map(c => (
                  <tr key={c.id} tabIndex={0} onClick={() => onOpen(c.id)}
                      onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onOpen(c.id); } }}>
                    {cols.map(col => <Cell key={col.key} col={col} c={c} />)}
                  </tr>
                ))}
              </tbody>
            </table>
          )}

          {rows.length > 0 && (
            <div className="pager">
              <div className="pager-info">
                Showing <b className="tnum">{pageRows.length}</b> of <b className="tnum">{rows.length}</b>
                {searching ? ' results' : ' campaigns'}
              </div>
              <div className="pager-ctl">
                <button className="pg-btn" disabled={safePage === 1} onClick={() => setPage(safePage - 1)}>
                  <Icon name="chevL" size={16} />
                </button>
                {Array.from({ length: totalPages }, (_, i) => i + 1).slice(0, 5).map(p => (
                  <button key={p} className={'pg-btn' + (p === safePage ? ' active' : '')} onClick={() => setPage(p)}>{p}</button>
                ))}
                {totalPages > 5 && <span className="pager-info">…</span>}
                <button className="pg-btn" disabled={safePage === totalPages} onClick={() => setPage(safePage + 1)}>
                  <Icon name="chevR" size={16} />
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  Object.assign(window, { ListScreen });
})();

</script>
<script type="text/babel" data-src="detail.jsx">
/* Campaign Detail — review / live monitor / archive. Exports window.DetailScreen */
(function () {
  const { Icon, StatusPill, CatTag, MerchLogo, fmtAED, fmtNum } = window;
  const { useState } = React;

  function Summary({ c }) {
    return (
      <div className="block">
        <div className="section-label">Offer summary</div>
        <div className="summary-card">
          {c.summary.map((seg, i) => seg[0] === 't'
            ? <b key={i}>{seg[1]}</b>
            : <React.Fragment key={i}>{seg[1]}</React.Fragment>)}
        </div>
      </div>
    );
  }

  function Terms({ c }) {
    return (
      <div className="block">
        <div className="section-label">Key terms</div>
        <div className="term-grid">
          <div className="term">
            <div className="term-label"><Icon name="coins" size={15} />Cashback</div>
            <div className="term-value tnum">{c.cashback}<small>%</small></div>
            <div className="term-sub">of qualifying spend</div>
          </div>
          <div className="term">
            <div className="term-label"><Icon name="wallet" size={15} />Total budget</div>
            <div className="term-value tnum">AED {fmtNum(c.budget)}</div>
            <div className="term-sub">merchant-funded</div>
          </div>
          <div className="term">
            <div className="term-label"><Icon name="cap" size={15} />Cap / cardholder</div>
            <div className="term-value tnum">AED {fmtNum(c.cap)}</div>
            <div className="term-sub">maximum reward each</div>
          </div>
        </div>
      </div>
    );
  }

  function Schedule({ c }) {
    return (
      <div className="block">
        <div className="section-label">Schedule</div>
        <div className="term-grid">
          <div className="term">
            <div className="term-label"><Icon name="calendar" size={15} />Start date</div>
            <div className="term-value" style={{ fontSize: 22 }}>{c.start}</div>
            <div className="term-sub">goes live 00:00 GST</div>
          </div>
          <div className="term">
            <div className="term-label"><Icon name="calendar" size={15} />End date</div>
            <div className="term-value" style={{ fontSize: 22 }}>{c.end}</div>
            <div className="term-sub">auto-closes</div>
          </div>
          <div className="term">
            <div className="term-label"><Icon name="refund" size={15} />Refund window</div>
            <div className="term-value tnum">{c.refundWindow}<small> days</small></div>
            <div className="term-sub">hold before payout</div>
          </div>
        </div>
      </div>
    );
  }

  function Audience({ c }) {
    const bars = [0.45, 0.7, 1, 0.85, 0.6, 0.4, 0.55, 0.3];
    return (
      <div className="block">
        <div className="section-label">Audience</div>
        <div className="aud-card">
          <div className="aud-head">
            <Icon name="users" size={26} style={{ color: 'var(--brand)' }} />
            <div>
              <div className="aud-num tnum">{fmtNum(c.audience)} <small>eligible cardholders</small></div>
              <div style={{ fontSize: 13, color: 'var(--ink-3)', marginTop: 2 }}>matched on the targeting conditions below</div>
            </div>
            <div className="aud-bars">
              {bars.map((h, i) => <i key={i} className={h >= 0.8 ? 'on' : ''} style={{ height: (h * 44) + 'px' }} />)}
            </div>
          </div>
          <div className="cond-list">
            {c.conditions.map((cond, i) => (
              <div key={i} className="cond">
                <Icon name="target" size={17} />
                <span>{cond}</span>
                <span className="ro"><Icon name="lock" size={12} />read-only</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  function MetricsStrip({ c }) {
    if (c.status !== 'live' && c.status !== 'completed') return null;
    const live = c.status === 'live';
    const p = c.perf || {};
    const activated = c.activated || 0;
    const rate = c.audience ? activated / c.audience : 0;
    const views = p.views || 0;
    const viewFrac = c.audience ? Math.min(1, views / (c.audience * 2)) : 0;

    const items = [
      { label: 'Eligible audience', value: fmtNum(c.audience), sub: 'matched cardholders',
        color: 'var(--st-accepted)', frac: 1, delta: null },
      { label: 'Offer activations', value: fmtNum(activated), sub: live ? 'opted in so far' : 'opted in total',
        color: 'var(--brand)', frac: rate, delta: live ? p.wkActivated : null },
      { label: 'Activation rate', value: (rate * 100).toFixed(1) + '%', sub: 'of eligible audience',
        color: 'var(--brand)', frac: rate, delta: null },
      { label: 'Offer views', value: fmtNum(views), sub: 'in-app impressions',
        color: 'var(--st-accepted)', frac: viewFrac, delta: live ? p.wkViews : null },
    ];

    return (
      <div className="block">
        <div className="section-label" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Icon name="trend" size={14} style={{ color: 'var(--brand)' }} />
          Campaign performance
          <span style={{ marginLeft: 'auto', fontWeight: 500, textTransform: 'none', letterSpacing: 0 }}>
            {live
              ? (p.daysElapsed > 0
                  ? `Day ${p.daysElapsed} of ${p.daysTotal} · ends ${c.end}`
                  : `Signed off · goes live ${c.start}`)
              : `Ran ${p.daysTotal} days · closed ${c.closedOn}`}
          </span>
        </div>
        <div className="metrics" style={{ '--mcols': 4 }}>
          {items.map((m, i) => (
            <div key={i} className="metric">
              <div className="metric-label">{m.label}</div>
              <div className="metric-value tnum">{m.value}</div>
              {m.delta != null ? (
                <div className="delta up"><Icon name="trend" size={13} />+{m.delta}% this week</div>
              ) : (
                <div className="delta flat">{m.sub}</div>
              )}
              <div className="metric-track"><i style={{ width: (m.frac * 100) + '%', background: m.color }} /></div>
            </div>
          ))}
        </div>
        <div className="note info" style={{ maxWidth: 680 }}>
          <Icon name="info" size={17} />
          <span>Cashback settlement — amounts paid, pending and refunded — is processed directly by the issuing bank and is not tracked in Pulse during alpha. Pulse reports in-app engagement only.</span>
        </div>
      </div>
    );
  }

  function CardholderPreview({ c }) {
    const cat = window.PULSE.categories[c.cat];
    return (
      <div>
        <div className="note info" style={{ maxWidth: 560, marginTop: 0, marginBottom: 24 }}>
          <Icon name="eye" size={17} />
          <span>This is how the offer renders inside the cardholder’s banking app. Bank reviewers cannot edit creative or copy — it is published by the merchant.</span>
        </div>
        <div className="phone-wrap">
          <div className="phone">
            <div className="phone-notch" />
            <div className="phone-screen">
              <div className="offer-hero" style={{ background: c.brand }}>
                <div className="offer-badge">{c.cashback}% CASHBACK</div>
                <div style={{ fontSize: 22, fontWeight: 800, marginTop: 10, letterSpacing: '-.02em' }}>{c.merchant}</div>
                <div style={{ fontSize: 14, opacity: .9 }}>{c.campaign}</div>
              </div>
              <div className="offer-body">
                <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
                  <span className="cat-tag" style={{ background: '#fff' }}><span className="cat-dot" style={{ background: cat.color }} />{cat.label}</span>
                </div>
                <p style={{ fontSize: 14.5, lineHeight: 1.55, color: 'var(--ink-2)' }}>
                  Get <b style={{ color: 'var(--brand-strong)' }}>{c.cashback}% back</b> on every eligible purchase at {c.merchant}, up to <b>AED {fmtNum(c.cap)}</b>. Cashback posts after a {c.refundWindow}-day window.
                </p>
                <div style={{ marginTop: 18, padding: '14px 16px', background: 'var(--brand-soft)', borderRadius: 12, fontSize: 13, color: 'var(--brand-strong)', fontWeight: 600 }}>
                  Valid {c.start} – {c.end}
                </div>
                <button className="btn btn-primary btn-lg" style={{ width: '100%', marginTop: 16 }}>Activate offer</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  function Banner({ c }) {
    if (c.status === 'live') {
      return (
        <div className="banner banner-live">
          <Icon name="pulse" size={20} />
          <div><b>Live</b> · campaign ending on {c.end}.</div>
          <div className="audit">Accepted {c.acceptedAt}<br />by {c.acceptedBy}</div>
        </div>
      );
    }
    if (c.status === 'completed') {
      return (
        <div className="banner banner-done">
          <Icon name="checkCircle" size={20} />
          <div><b>Completed</b> · campaign ended {c.closedOn}.</div>
          <div className="audit">Accepted {c.acceptedAt}<br />by {c.acceptedBy}</div>
        </div>
      );
    }
    if (c.status === 'rejected') {
      return (
        <div className="banner banner-rej">
          <Icon name="xCircle" size={20} />
          <div><b>Rejected</b> · returned to Lune Admin Portal.</div>
          <div className="audit">Rejected {c.rejectedAt} by {c.rejectedBy}<br />Reasons communicated to Lune by email.</div>
        </div>
      );
    }
    return null;
  }

  function RejectRecord({ c }) {
    return (
      <div className="block">
        <div className="section-label">Rejection record</div>
        <div className="aud-card">
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-3)', marginBottom: 10 }}>Reasons selected</div>
          <div className="chip-grid" style={{ marginTop: 0 }}>
            {(c.rejectReasons || []).map(r => (
              <span key={r} className="chip on" style={{ cursor: 'default' }}><Icon name="check" size={14} />{r}</span>
            ))}
          </div>
          {c.rejectNote && (
            <>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-3)', margin: '20px 0 8px' }}>Note to Lune</div>
              <div className="cond" style={{ alignItems: 'flex-start' }}>
                <Icon name="flag" size={17} />
                <span style={{ fontStyle: 'italic' }}>“{c.rejectNote}”</span>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  function DetailScreen({ c, onBack, onAccept, onReject, onOpenMonitor, onJump }) {
    const [sub, setSub] = useState('Overview');
    const cat = window.PULSE.categories[c.cat];
    const isPending = c.status === 'pending';

    return (
      <div className="page">
        <div className="detail-wrap">
          <button className="back-link" onClick={onBack}>
            <Icon name="arrowL" size={16} />Back to Campaign Manager
          </button>

          <div className="detail-head">
            <MerchLogo c={c} size={56} />
            <div className="dh-text">
              <div className="dh-title">
                {c.merchant} · {c.campaign}
                <StatusPill status={c.status} />
              </div>
              <div className="dh-meta">
                <CatTag cat={c.cat} />
                {c.received && <><span className="sep" /><span><b style={{ color: 'var(--ink)', fontWeight: 600 }}>Received</b> {c.received}</span></>}
                <span className="sep" /><span className="mono">REF {c.ref}</span>
              </div>
            </div>
            <div className="dh-actions">
              <button className={'btn ' + (sub === 'Cardholder Preview' ? 'btn-primary' : 'btn-ghost')} onClick={() => setSub('Cardholder Preview')}>
                <Icon name="eye" size={17} />Cardholder Preview
              </button>
            </div>
          </div>

          {/* sub-tabs (only meaningful on review) */}
          <div className="subtabs">
            {c.subTabs.map(s => (
              <button key={s} className={'subtab' + (sub === s ? ' active' : '')} onClick={() => setSub(s)}>{s}</button>
            ))}
          </div>

          {sub === 'Cardholder Preview' ? (
            <CardholderPreview c={c} />
          ) : sub === 'Enrichment' ? (
            <div className="block">
              <Audience c={c} />
              <div className="note info" style={{ maxWidth: 560 }}>
                <Icon name="info" size={17} />
                <span>Targeting conditions are computed by Lune Enrichment from this bank’s transaction history. They are read-only on the bank side.</span>
              </div>
            </div>
          ) : (
            <>
              <Banner c={c} />
              {c.status === 'rejected' && <RejectRecord c={c} />}
              <MetricsStrip c={c} />
              <Summary c={c} />
              <Terms c={c} />
              <Schedule c={c} />
              <Audience c={c} />
            </>
          )}

          {c.status === 'live' && sub === 'Overview' && (
            <div style={{ marginTop: 8 }}>
              <button className="btn btn-ghost" onClick={onOpenMonitor}><Icon name="trend" size={17} />Open full live monitor</button>
            </div>
          )}
        </div>

        {/* decision footer — only review pending */}
        {isPending && (
          <div className="decision">
            <div className="decision-text">
              <div className="dl"><Icon name="alert" size={15} />Decision required</div>
              <div className="ds">This action is logged and cannot be undone.</div>
            </div>
            {(() => {
              const q = window.PULSE.byStatus('pending');
              const i = q.findIndex(x => x.id === c.id);
              if (i < 0 || !onJump) return null;
              return (
                <div className="queue-nav">
                  <button className="pg-btn" disabled={i === 0} onClick={() => onJump(q[i - 1].id)} title="Previous pending campaign"><Icon name="chevL" size={16} /></button>
                  <span className="queue-pos tnum">{i + 1} of {q.length} pending</span>
                  <button className="pg-btn" disabled={i === q.length - 1} onClick={() => onJump(q[i + 1].id)} title="Next pending campaign"><Icon name="chevR" size={16} /></button>
                </div>
              );
            })()}
            <div className="decision-actions">
              <button className="btn btn-danger btn-lg" onClick={onReject}><Icon name="x" size={17} />Reject</button>
              <button className="btn btn-primary btn-lg" onClick={onAccept}><Icon name="check" size={17} />Accept</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  Object.assign(window, { DetailScreen });
})();

</script>
<script type="text/babel" data-src="modals.jsx">
/* Accept & Reject modals + confirmation screens. Exports window.AcceptModal, RejectModal, ConfirmScreen */
(function () {
  const { Icon, fmtNum } = window;
  const { useState } = React;

  function Overlay({ treatment, onClose, children }) {
    return (
      <div className={'overlay' + (treatment === 'sheet' ? ' sheet' : '')} onClick={onClose}>
        <div className="modal" onClick={e => e.stopPropagation()}>{children}</div>
      </div>
    );
  }

  function goLiveLabel(c) {
    // "08 MAY · 00:00 GST"
    const parts = (c.start || '').split(' ');
    const d = (parts[0] || '').padStart(2, '0');
    const m = (parts[1] || '').toUpperCase().slice(0, 3);
    return `${d} ${m} · 00:00 GST`;
  }

  function AcceptModal({ c, treatment, onClose, onConfirm }) {
    return (
      <Overlay treatment={treatment} onClose={onClose}>
        <div className="modal-head">
          <div className="modal-ico go"><Icon name="check" size={21} /></div>
          <div>
            <div className="modal-title">Accept this campaign?</div>
            <div className="modal-sub">
              You’re accepting <b style={{ color: 'var(--ink)' }}>{c.merchant} · {c.campaign}</b> for distribution to <b style={{ color: 'var(--ink)' }}>{fmtNum(c.audience)}</b> cardholders. The offer goes live at 00:00 GST on {c.start}.
            </div>
          </div>
          <button className="modal-close" onClick={onClose}><Icon name="x" size={18} /></button>
        </div>
        <div className="modal-body">
          <div className="recap">
            <div className="recap-item hl">
              <div className="rl">Goes live</div>
              <div className="rv tnum">{goLiveLabel(c)}</div>
            </div>
            <div className="recap-item">
              <div className="rl">Cashback</div>
              <div className="rv tnum">{c.cashback}%</div>
            </div>
            <div className="recap-item">
              <div className="rl">Budget</div>
              <div className="rv tnum">AED {fmtNum(c.budget)}</div>
            </div>
            <div className="recap-item">
              <div className="rl">Audience</div>
              <div className="rv tnum">{fmtNum(c.audience)}</div>
            </div>
          </div>
          <div className="note warn">
            <Icon name="alert" size={17} />
            <span><b>Note:</b> this action cannot be undone. To pause post-launch, contact your Lune partnership lead.</span>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={onConfirm}><Icon name="sign" size={17} />Accept & Sign off</button>
        </div>
      </Overlay>
    );
  }

  const REASONS = ['Cap too low', 'Audience overlap', 'Brand mismatch', 'Off calendar', 'Compliance', 'Other'];

  function RejectModal({ c, treatment, onClose, onConfirm }) {
    const [picked, setPicked] = useState([]);
    const [note, setNote] = useState('');
    function toggle(r) {
      setPicked(p => p.includes(r) ? p.filter(x => x !== r) : [...p, r]);
    }
    return (
      <Overlay treatment={treatment} onClose={onClose}>
        <div className="modal-head">
          <div className="modal-ico stop"><Icon name="arrowL" size={21} /></div>
          <div>
            <div className="modal-title">Reject &amp; return to Lune?</div>
            <div className="modal-sub">
              The campaign will be returned to Lune. Please share a reason — it helps refine future dispatches.
            </div>
          </div>
          <button className="modal-close" onClick={onClose}><Icon name="x" size={18} /></button>
        </div>
        <div className="modal-body">
          <div className="field-label">Reason <span className="opt">· select any that apply</span></div>
          <div className="chip-grid">
            {REASONS.map(r => (
              <button key={r} className={'chip' + (picked.includes(r) ? ' on' : '')} onClick={() => toggle(r)}>
                {picked.includes(r) && <Icon name="check" size={14} />}{r}
              </button>
            ))}
          </div>
          <div className="field-label">Add a note <span className="opt">· optional, shared with Lune</span></div>
          <textarea
            className="field"
            placeholder="e.g. Cap of AED 75 is below our Q2 floor of AED 120…"
            value={note}
            onChange={e => setNote(e.target.value)}
          />
          <div className="note info">
            <Icon name="info" size={17} />
            <span>Your reasons are emailed to Lune ops. All merchant communication is mediated by Lune in alpha.</span>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-danger-solid" onClick={() => onConfirm({ reasons: picked, note })}>
            <Icon name="send" size={16} />Reject &amp; Return
          </button>
        </div>
      </Overlay>
    );
  }

  function ConfirmScreen({ kind, c, result, onViewAll, onMonitor }) {
    if (kind === 'accept') {
      return (
        <div className="page">
          <div className="confirm-wrap">
            <div className="confirm-ico ok"><Icon name="checkCircle" size={40} /></div>
            <div className="confirm-title display">Campaign accepted.</div>
            <div className="confirm-sub">
              {c.merchant} · {c.campaign} is signed off and scheduled. It goes live automatically at the start of the offer window.
            </div>
            <div className="confirm-card">
              <div className="confirm-row">
                <span className="cl">Status</span>
                <span className="cv"><span className="pill accepted"><span className="pdot" />Accepted</span></span>
              </div>
              <div className="confirm-row">
                <span className="cl">Goes live</span>
                <span className="cv tnum">{goLiveLabel(c)}</span>
              </div>
              <div className="confirm-row">
                <span className="cl">Reference</span>
                <span className="cv mono">{c.ref}</span>
              </div>
              <div className="confirm-row">
                <span className="cl">Signed off by</span>
                <span className="cv">Layla Haddad · just now</span>
              </div>
            </div>
            <div className="confirm-actions">
              <button className="btn btn-ghost btn-lg" onClick={onViewAll}>View all campaigns</button>
              <button className="btn btn-primary btn-lg" onClick={onMonitor}><Icon name="trend" size={17} />Open live monitor</button>
            </div>
          </div>
        </div>
      );
    }
    // reject
    return (
      <div className="page">
        <div className="confirm-wrap">
          <div className="confirm-ico rej"><Icon name="arrowL" size={40} /></div>
          <div className="confirm-title display">Returned to Lune.</div>
          <div className="confirm-sub">
            {c.merchant} · {c.campaign} has been returned to the Lune Admin Portal. Your reasons were emailed to Lune ops.
          </div>
          <div className="confirm-card">
            <div className="confirm-row">
              <span className="cl">Status</span>
              <span className="cv"><span className="pill rejected"><span className="pdot" />Rejected</span></span>
            </div>
            {result && result.reasons && result.reasons.length > 0 && (
              <div className="confirm-row">
                <span className="cl">Reasons</span>
                <span className="cv" style={{ fontWeight: 600 }}>{result.reasons.join(', ')}</span>
              </div>
            )}
            <div className="confirm-row">
              <span className="cl">Rejected by</span>
              <span className="cv">Layla Haddad · just now</span>
            </div>
          </div>
          <div className="confirm-actions">
            <button className="btn btn-primary btn-lg" onClick={onViewAll}>View all campaigns</button>
          </div>
        </div>
      </div>
    );
  }

  Object.assign(window, { AcceptModal, RejectModal, ConfirmScreen });
})();

</script>
<script type="text/babel" data-src="app.jsx">
/* App root: routing, accept/reject mutations, Tweaks. Exports nothing (mounts). */
(function () {
  const { useState, useEffect, useMemo } = React;
  const { Shell, ListScreen, DetailScreen, AcceptModal, RejectModal, ConfirmScreen } = window;
  const { useTweaks, TweaksPanel, TweakSection, TweakColor, TweakSelect, TweakRadio, TweakText } = window;

  // ---- theme palettes (brand, strong, deep, soft, tint, accent) ----
  const PALETTES = {
    Emerald: ['#2F8C82', '#27786F', '#002E2A', 'rgba(47,140,130,0.10)', '#F7FAF9', '#469A93'],
    Forest:  ['#1F8A4D', '#15703D', '#0C3A22', 'rgba(31,138,77,0.10)', '#F6FAF7', '#46B96A'],
    Teal:    ['#0C9486', '#0A7468', '#06302C', 'rgba(12,148,134,0.10)', '#F4FAF9', '#46A89B'],
    Spring:  ['#33A65B', '#258048', '#123E26', 'rgba(51,166,91,0.10)', '#F5FAF6', '#5FC07E'],
  };
  const FONTS = {
    'Plus Jakarta': ["'Plus Jakarta Sans', system-ui, sans-serif"],
    'Hanken Grotesk': ["'Hanken Grotesk', system-ui, sans-serif"],
    'Instrument':   ["'Instrument Sans', system-ui, sans-serif"],
  };

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "bankName": "Dubai Retail Group",
    "palette": "Emerald",
    "font": "Plus Jakarta",
    "density": "regular",
    "corners": "soft",
    "modalStyle": "centered"
  }/*EDITMODE-END*/;

  function applyTheme(t) {
    const root = document.documentElement;
    const p = PALETTES[t.palette] || PALETTES.Emerald;
    root.style.setProperty('--brand', p[0]);
    root.style.setProperty('--brand-strong', p[1]);
    root.style.setProperty('--brand-deep', p[2]);
    root.style.setProperty('--brand-soft', p[3]);
    root.style.setProperty('--brand-tint', p[4]);
    root.style.setProperty('--accent', p[5]);
    root.style.setProperty('--st-live', p[0]);
    const f = FONTS[t.font] || FONTS['Plus Jakarta'];
    root.style.setProperty('--font-ui', f[0]);
    root.setAttribute('data-density', t.density);
    root.setAttribute('data-corners', t.corners);
  }

  function liveCounts() {
    const b = window.PULSE.byStatus;
    return {
      pending: b('pending').length,
      live: b('live').length,
      completed: b('completed').length + b('accepted').length,
      rejected: b('rejected').length,
    };
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [route, setRoute] = useState({ name: 'list' });
    const [modal, setModal] = useState(null); // 'accept' | 'reject' | null
    const [, force] = useState(0);

    useEffect(() => { applyTheme(t); }, [t.palette, t.font, t.density, t.corners]);

    // keep KPI counts live across mutations
    window.PULSE.counts = liveCounts();

    const current = route.id ? window.PULSE.find(route.id) : null;

    function open(id) { setRoute({ name: 'detail', id }); scrollTop(); }
    function back() { setRoute({ name: 'list' }); scrollTop(); }

    const modalRef = React.useRef(null);
    modalRef.current = modal;
    React.useEffect(() => {
      function onKey(e) {
        if (e.key !== 'Escape') return;
        if (modalRef.current) { setModal(null); return; }
        setRoute(r => (r.name === 'detail' ? { name: 'list' } : r));
      }
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, []);
    function scrollTop() { const m = document.querySelector('.main'); if (m) m.scrollTop = 0; }

    function confirmAccept() {
      const c = current;
      c.status = 'live';
      c.liveOn = c.start;
      c.acceptedBy = 'Layla Haddad';
      c.acceptedAt = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + ' · ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' GST';
      c.activated = 0;
      c.perf = { views: 0, daysElapsed: 0, daysTotal: 50 };
      setModal(null);
      setRoute({ name: 'confirm', id: c.id, kind: 'accept' });
      scrollTop();
    }
    function confirmReject(result) {
      const c = current;
      c.status = 'rejected';
      c.rejectedOn = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      c.rejectedBy = 'Layla Haddad';
      c.rejectedAt = c.rejectedOn + ' · ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' GST';
      c.rejectReasons = result.reasons;
      c.rejectNote = result.note;
      setModal(null);
      setRoute({ name: 'confirm', id: c.id, kind: 'reject', result });
      scrollTop();
    }

    const crumbs = route.name === 'list'
      ? ['Pulse', 'Campaign Manager']
      : route.name === 'confirm'
        ? ['Pulse', 'Campaign Manager', route.kind === 'accept' ? 'Accepted' : 'Returned']
        : ['Pulse', 'Campaign Manager', current ? current.merchant : 'Campaign'];

    function goSearch() {
      setRoute({ name: 'list' });
      scrollTop();
      setTimeout(() => {
        const el = document.getElementById('pulse-search');
        if (el) el.focus();
      }, 60);
    }

    const notifications = window.PULSE.byStatus('pending').slice(0, 4).map(c => ({
      id: c.id,
      title: `${c.merchant} · ${c.campaign}`,
      sub: `New campaign awaiting review · ${c.received || c.createdOn}`,
      onClick: () => open(c.id),
    }));

    return (
      <Shell
        crumbs={crumbs}
        onCrumb={(i) => { if (i <= 1) back(); }}
        onHome={back}
        onSearch={goSearch}
        notifications={notifications}
        pendingCount={window.PULSE.counts.pending}
        bankName={t.bankName}
      >
        {route.name === 'list' && <ListScreen onOpen={open} />}

        {route.name === 'detail' && current && (
          <DetailScreen
            c={current}
            onJump={open}
            onBack={back}
            onAccept={() => setModal('accept')}
            onReject={() => setModal('reject')}
            onOpenMonitor={() => { force(x => x + 1); }}
          />
        )}

        {route.name === 'confirm' && current && (
          <ConfirmScreen
            kind={route.kind}
            c={current}
            result={route.result}
            onViewAll={back}
            onMonitor={() => { setRoute({ name: 'detail', id: current.id }); scrollTop(); }}
          />
        )}

        {modal === 'accept' && current && (
          <AcceptModal c={current} treatment={t.modalStyle} onClose={() => setModal(null)} onConfirm={confirmAccept} />
        )}
        {modal === 'reject' && current && (
          <RejectModal c={current} treatment={t.modalStyle} onClose={() => setModal(null)} onConfirm={confirmReject} />
        )}

        <TweaksPanel>
          <TweakSection label="Demo" />
          <TweakText label="Account name" value={t.bankName} placeholder="e.g. Dubai Retail Group"
            onChange={v => setTweak('bankName', v)} />
          <TweakSection label="Brand" />
          <TweakColor label="Green tone" value={PALETTES[t.palette] || PALETTES.Emerald}
            options={Object.keys(PALETTES).map(k => PALETTES[k])}
            onChange={arr => {
              const name = Object.keys(PALETTES).find(k => PALETTES[k][0] === arr[0]) || 'Emerald';
              setTweak('palette', name);
            }} />
          <TweakSection label="Typography" />
          <TweakSelect label="Font" value={t.font}
            options={Object.keys(FONTS)} onChange={v => setTweak('font', v)} />
          <TweakSection label="Layout" />
          <TweakRadio label="Density" value={t.density}
            options={['compact', 'regular', 'comfy']} onChange={v => setTweak('density', v)} />
          <TweakRadio label="Corners" value={t.corners}
            options={['sharp', 'soft', 'round']} onChange={v => setTweak('corners', v)} />
          <TweakRadio label="Modal style" value={t.modalStyle}
            options={['centered', 'sheet']} onChange={v => setTweak('modalStyle', v)} />
        </TweaksPanel>
      </Shell>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();

</script>
</body>
</html>
