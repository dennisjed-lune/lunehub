<!DOCTYPE html>
<html lang="en" data-density="regular" data-corners="soft">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lune Pulse — Bank Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Cormorant+Garamond:ital,wght@1,500;1,600;1,700&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
/* ===== ds/tokens/colors.css ===== */
/* ============================================================
   Lune — Color tokens
   ------------------------------------------------------------
   Source of truth: Lune UI Library + Category Icons (Figma) and
   the Lune logo suite. Primary is emerald #10A37F (the crescent),
   anchored by deep teal #002E2A and the near-black "ink" #070312.
   ============================================================ */

:root {
  /* ---- Brand core ---- */
  --lune-emerald:      #10A37F;  /* primary — the crescent / accent */
  --lune-teal:         #002E2A;  /* deep forest teal — wordmark, dark surfaces */
  --lune-teal-700:     #0A634D;  /* mid teal — category-icon green */
  --lune-mint:         #99F2AC;  /* bright mint — success, highlights */
  --lune-ink:          #070312;  /* near-black aubergine — dark canvas */
  --lune-sea:          #469A93;  /* muted sea green — secondary accent */

  /* ---- Emerald ramp (primary, from Figma opacity steps) ---- */
  --primary-100:       #10A37F;
  --primary-90:        rgba(16,163,127,0.90);
  --primary-80:        rgba(16,163,127,0.80);
  --primary-70:        rgba(16,163,127,0.70);
  --primary-60:        rgba(16,163,127,0.60);
  --primary-50:        rgba(16,163,127,0.50);
  --primary-40:        rgba(16,163,127,0.40);
  --primary-30:        rgba(16,163,127,0.30);
  --primary-20:        rgba(16,163,127,0.20);
  --primary-10:        rgba(16,163,127,0.10);

  /* ---- Neutral ramp (cool, faintly teal-tinted greys) ---- */
  --neutral-0:         #FFFFFF;
  --neutral-25:        #F7F9F8;
  --neutral-50:        #EEF2F1;
  --neutral-100:       #E2E8E6;
  --neutral-200:       #C9D3D0;
  --neutral-300:       #A7B4B0;
  --neutral-400:       #7E8E89;
  --neutral-500:       #5C6B66;
  --neutral-600:       #44524E;
  --neutral-700:       #2E3A36;
  --neutral-800:       #1B2421;
  --neutral-900:       #0E1513;
  --neutral-950:       #070312;

  /* ---- Status (from the Figma status-pill set) ---- */
  --status-success:    #99F2AC;  /* "Completed" */
  --status-success-ink:#063D1B;
  --status-warning:    #FBDA7D;  /* "Under Review" */
  --status-warning-ink:#5A4205;
  --status-info:       #5A9CB5;  /* informational (category palette) */
  --status-info-ink:   #0C3543;
  --status-error:      #F26076;  /* declined / error (category palette) */
  --status-error-ink:  #5C0C18;

  /* ---- Category accent hues (from Category Icons "Colours") ---- */
  --cat-dining:        #FF7444;
  --cat-grocery:       #E76F2E;
  --cat-shopping:      #F26076;
  --cat-wellness:      #F49BAB;
  --cat-transport:     #5A9CB5;
  --cat-travel:        #6F8F72;
  --cat-financial:     #3852B4;
  --cat-savings:       #A594F9;
  --cat-income:        #0A634D;
  --cat-household:     #C4A484;
  --cat-student:       #B7BDF7;
  --cat-misc:          #758A93;

  /* ============================================================
     Semantic aliases — light theme (default)
     ============================================================ */
  --bg-canvas:         var(--neutral-25);
  --bg-surface:        var(--neutral-0);
  --bg-raised:         var(--neutral-0);
  --bg-sunken:         var(--neutral-50);
  --bg-inverse:        var(--lune-ink);

  --surface-card:      var(--neutral-0);
  --surface-muted:     var(--neutral-50);
  --surface-emerald:   var(--primary-10);

  --text-primary:      var(--lune-teal);
  --text-secondary:    var(--neutral-600);
  --text-tertiary:     var(--neutral-400);
  --text-on-emerald:   var(--neutral-0);
  --text-on-inverse:   var(--neutral-0);
  --text-link:         var(--lune-emerald);

  --border-subtle:     var(--neutral-100);
  --border-default:    var(--neutral-200);
  --border-strong:     var(--neutral-300);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #0E9173;
  --accent-press:      #0B7C62;
  --focus-ring:        rgba(16,163,127,0.35);
}

/* ============================================================
   Dark theme — set data-theme="dark" on a wrapper or <html>
   The Lune cover/cover-page use the ink canvas with white type
   and emerald accents.
   ============================================================ */
[data-theme="dark"] {
  --bg-canvas:         var(--lune-ink);
  --bg-surface:        #110B1F;
  --bg-raised:         #181023;
  --bg-sunken:         #0B0716;
  --bg-inverse:        var(--neutral-0);

  --surface-card:      #14101F;
  --surface-muted:     #1B1528;
  --surface-emerald:   rgba(16,163,127,0.16);

  --text-primary:      var(--neutral-0);
  --text-secondary:    #B8B2C4;
  --text-tertiary:     #7C7689;
  --text-on-emerald:   var(--lune-ink);
  --text-on-inverse:   var(--lune-teal);
  --text-link:         var(--lune-mint);

  --border-subtle:     rgba(255,255,255,0.08);
  --border-default:    rgba(255,255,255,0.14);
  --border-strong:     rgba(255,255,255,0.24);
  --border-emerald:    var(--lune-emerald);

  --accent:            var(--lune-emerald);
  --accent-hover:      #2BB996;
  --accent-press:      #46A893;
  --focus-ring:        rgba(153,242,172,0.40);
}

/* ===== ds/tokens/typography.css ===== */
/* ============================================================
   Lune — Typography tokens
   ------------------------------------------------------------
   Type scale lifted directly from the Lune UI Library type spec.
   Body family: Plus Jakarta Sans. Display: Cormorant Garamond
   (Bold Italic — reserved for hero / editorial moments).
   Every step is set at 150% line-height per the spec, except the
   display face which runs tight at 100%.
   ============================================================ */

:root {
  /* ---- Families ---- */
  --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
               "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-display: "Cormorant Garamond", ui-serif, Georgia,
                  "Times New Roman", serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* ---- Weights ---- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-semibold:600;
  --weight-bold:    700;
  --weight-extra:   800;

  /* ---- Type scale (px) — name : size / line-height ---- */
  --text-h1-size: 36px;   --text-h1-lh: 1.5;
  --text-h2-size: 32px;   --text-h2-lh: 1.5;
  --text-h3-size: 28px;   --text-h3-lh: 1.5;
  --text-h4-size: 24px;   --text-h4-lh: 1.5;
  --text-h5-size: 20px;   --text-h5-lh: 1.5;
  --text-title1-size: 18px; --text-title1-lh: 1.5;
  --text-title2-size: 16px; --text-title2-lh: 1.5;
  --text-body-size: 14px; --text-body-lh: 1.5;
  --text-caption-size: 12px; --text-caption-lh: 1.5;

  /* Display (Cormorant Garamond, Bold Italic, tight) */
  --text-display-size: 88px; --text-display-lh: 1.0;

  /* ---- Letter-spacing ---- */
  --tracking-tight: -0.02em;   /* large sans headings + hero */
  --tracking-normal: 0;
  --tracking-wide: 0.04em;     /* uppercase pill / eyebrow labels */
}

/* ============================================================
   Type helper classes — apply directly or use as reference.
   ============================================================ */
.lune-display {
  font-family: var(--font-display);
  font-weight: var(--weight-bold);
  font-style: italic;
  font-size: var(--text-display-size);
  line-height: var(--text-display-lh);
  letter-spacing: var(--tracking-tight);
}
.lune-h1 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h1-size); line-height: var(--text-h1-lh); letter-spacing: var(--tracking-tight); }
.lune-h2 { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-h2-size); line-height: var(--text-h2-lh); letter-spacing: var(--tracking-tight); }
.lune-h3 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h3-size); line-height: var(--text-h3-lh); }
.lune-h4 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h4-size); line-height: var(--text-h4-lh); }
.lune-h5 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-h5-size); line-height: var(--text-h5-lh); }
.lune-title1 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title1-size); line-height: var(--text-title1-lh); }
.lune-title2 { font-family: var(--font-sans); font-weight: var(--weight-semibold);
  font-size: var(--text-title2-size); line-height: var(--text-title2-lh); }
.lune-body { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-body-size); line-height: var(--text-body-lh); }
.lune-caption { font-family: var(--font-sans); font-weight: var(--weight-regular);
  font-size: var(--text-caption-size); line-height: var(--text-caption-lh); }
.lune-eyebrow { font-family: var(--font-sans); font-weight: var(--weight-bold);
  font-size: var(--text-caption-size); line-height: 1; letter-spacing: var(--tracking-wide);
  text-transform: uppercase; }

/* ===== ds/tokens/spacing.css ===== */
/* ============================================================
   Lune — Spacing, radius, elevation & motion tokens
   ------------------------------------------------------------
   Spacing is a 4px base scale (Figma gaps observed: 8/20/24/32/48/64).
   Radii run from tight inputs up to the fully-rounded status pills
   (the Figma pills use a 72px radius = effectively pill-shaped).
   ============================================================ */

:root {
  /* ---- Spacing (4px base) ---- */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;
  --space-32: 128px;

  /* ---- Radii ---- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   12px;   /* default control / card radius */
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-2xl:  32px;
  --radius-pill: 999px;  /* status pills, chips, avatars */

  /* ---- Border widths ---- */
  --border-hairline: 1px;
  --border-thick:    1.5px;

  /* ---- Elevation — soft, cool-toned shadows (teal-tinted) ---- */
  --shadow-xs:  0 1px 2px rgba(7,3,18,0.06);
  --shadow-sm:  0 1px 3px rgba(7,3,18,0.08), 0 1px 2px rgba(7,3,18,0.04);
  --shadow-md:  0 4px 12px rgba(7,3,18,0.08), 0 2px 4px rgba(7,3,18,0.04);
  --shadow-lg:  0 12px 32px rgba(7,3,18,0.12), 0 4px 8px rgba(7,3,18,0.05);
  --shadow-xl:  0 24px 64px rgba(7,3,18,0.16);
  --shadow-emerald: 0 8px 24px rgba(16,163,127,0.28);

  /* ---- Motion ---- */
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);   /* @kind other */
  --ease-emphasis: cubic-bezier(0.3, 0.7, 0, 1); /* @kind other */
  --ease-out:      cubic-bezier(0, 0, 0.2, 1);   /* @kind other */
  --dur-fast:   120ms;  /* @kind other */
  --dur-base:   200ms;  /* @kind other */
  --dur-slow:   320ms;  /* @kind other */

  /* ---- Layout ---- */
  --container-max: 1200px;
  --container-prose: 680px;
}

/* ===== styles.css ===== */
/* ============================================================
   Lune Pulse — Bank Journey
   Re-skinned onto the official Lune design system.
   App-layer variables map onto Lune tokens; the Tweaks layer
   overrides the --brand* group for palette exploration.
   ============================================================ */


:root {
  /* brand — overridden by tweaks; defaults = true Lune emerald */
  --brand:        var(--lune-emerald);   /* #10A37F */
  --brand-strong: var(--accent-hover);   /* #0E9173 */
  --brand-deep:   var(--lune-teal);      /* #002E2A */
  --brand-soft:   var(--primary-10);
  --brand-tint:   var(--neutral-25);
  --accent2:      var(--lune-sea);

  /* neutrals → Lune neutral ramp */
  --canvas:    var(--neutral-25);
  --surface:   var(--neutral-0);
  --surface-2: #FAFCFB;
  --line:      var(--neutral-100);
  --line-soft: var(--neutral-50);
  --ink:       var(--lune-teal);     /* deep-teal primary text */
  --ink-2:     var(--neutral-600);
  --ink-3:     var(--neutral-400);

  /* semantic (Lune status set) */
  --pos:    #0B7C62;            --pos-bg: var(--primary-10);
  --warn:   var(--status-warning-ink); --warn-bg: #FCEFC6;
  --neg:    var(--status-error-ink);   --neg-bg: #FBE0E4;
  --info:   var(--status-info-ink);    --info-bg: #E3EEF2;

  /* status pills — solid Lune chips */
  --st-pending: #FBDA7D;  --st-pending-ink: #5A4205;
  --st-live:    var(--lune-emerald); --st-live-ink: #FFFFFF;
  --st-accepted:#5A9CB5;  --st-accepted-ink: #FFFFFF;
  --st-done:    #99F2AC;  --st-done-ink: #063D1B;
  --st-rej:     #F26076;  --st-rej-ink: #FFFFFF;

  /* type */
  --font-ui:      var(--font-sans);
  --font-display: var(--font-display);
  --font-mono:    var(--font-mono);

  /* shape + rhythm (density-driven) */
  --radius:    var(--radius-md);   /* 12 — app default control/card radius */
  --radius-xl2: var(--radius-xl);  /* 24 */
  --u:         8px;
  --row-h:     56px;
  --fs-base:   14px;

  --shadow-pop: var(--shadow-emerald);
}

/* density variants */
:root[data-density="compact"] { --u: 6px;  --row-h: 46px; --fs-base: 13px; }
:root[data-density="regular"] { --u: 8px;  --row-h: 56px; --fs-base: 14px; }
:root[data-density="comfy"]   { --u: 11px; --row-h: 66px; --fs-base: 15px; }

/* radius variants */
:root[data-corners="sharp"] { --radius: 6px;  --radius-sm: 4px;  --radius-lg: 10px;  --radius-xl2: 14px; }
:root[data-corners="soft"]  { --radius: 12px; --radius-sm: 8px;  --radius-lg: 16px;  --radius-xl2: 24px; }
:root[data-corners="round"] { --radius: 18px; --radius-sm: 13px; --radius-lg: 24px;  --radius-xl2: 30px; }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--canvas);
  color: var(--ink);
  font-family: var(--font-ui);
  font-size: var(--fs-base);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { height: 100%; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }
.tnum { font-variant-numeric: tabular-nums; }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: .02em; }
.display { font-family: var(--font-display); font-style: italic; font-weight: 700; letter-spacing: -.02em; }
::selection { background: var(--brand-soft); }

/* ---------- App frame ---------- */
.app { display: grid; grid-template-columns: 256px 1fr; height: 100%; overflow: hidden; }
:root[data-density="compact"] .app { grid-template-columns: 232px 1fr; }

/* ---------- Sidebar ---------- */
.sidebar {
  background: var(--surface); border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: calc(var(--u)*3) calc(var(--u)*2);
  gap: 2px; overflow-y: auto;
}
.brand-mark { display: flex; align-items: center; gap: 11px; padding: 4px calc(var(--u)*1); margin-bottom: calc(var(--u)*3); }
.brand-logo {
  width: 40px; height: 40px; border-radius: var(--radius); flex: none;
  background: var(--lune-teal); display: grid; place-items: center;
  box-shadow: var(--shadow-xs);
}
.brand-logo img { width: 26px; height: 26px; display: block; }
.brand-name { font-weight: 700; font-size: 17px; letter-spacing: -.02em; color: var(--ink); line-height: 1.1; white-space: nowrap; }
.brand-sub { font-size: 11px; color: var(--ink-3); letter-spacing: .01em; margin-top: 3px; white-space: nowrap; }

.nav-label {
  font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide);
  text-transform: uppercase; color: var(--ink-3);
  padding: 0 calc(var(--u)*1.25); margin: calc(var(--u)*2.5) 0 calc(var(--u)*0.75);
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px calc(var(--u)*1.25); border-radius: var(--radius);
  color: var(--ink-2); font-size: 14px; font-weight: 500;
  width: 100%; text-align: left; position: relative;
  transition: background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);
}
.nav-item svg { width: 19px; height: 19px; flex: none; opacity: .75; }
.nav-item:hover { background: var(--brand-tint); color: var(--ink); }
.nav-item.active { background: var(--brand-soft); color: var(--brand-strong); font-weight: 600; }
.nav-item.active svg { opacity: 1; color: var(--brand); }
.nav-item .nav-badge {
  margin-left: auto; font-size: 11px; font-weight: 700;
  background: var(--brand); color: #fff; border-radius: var(--radius-pill);
  min-width: 20px; height: 20px; display: grid; place-items: center; padding: 0 6px;
}
.nav-child { padding-left: calc(var(--u)*4); font-size: 13.5px; }
.nav-prod {
  display: flex; align-items: center; gap: 11px;
  padding: 10px calc(var(--u)*1.25); border-radius: var(--radius);
  font-size: 14px; font-weight: 600; width: 100%; text-align: left;
}
.nav-prod .prod-mark { width: 22px; height: 22px; border-radius: 7px; flex: none; display: grid; place-items: center; }
.nav-prod .prod-mark img { width: 20px; height: 20px; }

.sidebar-foot { margin-top: auto; padding-top: calc(var(--u)*2.5); }
.user-chip { display: flex; align-items: center; gap: 11px; padding: 9px; border-radius: var(--radius); border: 1px solid var(--line); }
.user-av {
  width: 34px; height: 34px; border-radius: 10px; flex: none;
  background: var(--lune-teal); color: var(--lune-mint);
  display: grid; place-items: center; font-weight: 700; font-size: 13px;
}
.user-meta { line-height: 1.3; min-width: 0; }
.user-meta b { font-size: 13px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
.user-meta small { font-size: 11px; color: var(--ink-3); }

/* ---------- Main ---------- */
.main { overflow-y: auto; height: 100%; position: relative; }
.topbar {
  position: sticky; top: 0; z-index: 20;
  background: color-mix(in srgb, var(--canvas) 88%, transparent);
  backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 14px;
  padding: calc(var(--u)*2) calc(var(--u)*4);
}
.crumbs { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--ink-3); white-space: nowrap; }
.crumbs b { color: var(--ink); font-weight: 600; }
.crumbs .sep { opacity: .5; display: inline-flex; }
.crumb-link { font-size: 13px; color: var(--ink-3); font-weight: 500; padding: 2px 4px; border-radius: var(--radius-sm); transition: color var(--dur-fast) var(--ease-standard), background var(--dur-fast) var(--ease-standard); }
.crumb-link:hover { color: var(--brand-strong); background: var(--brand-tint); }
.topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

/* notifications */
.notif-wrap { position: relative; }
.notif-dot { position: absolute; top: 7px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: var(--st-rej); border: 2px solid var(--surface); }
.notif-pop {
  position: absolute; top: calc(100% + 10px); right: 0; z-index: 40;
  width: 340px; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden;
  animation: pop var(--dur-base) var(--ease-emphasis);
}
.notif-head { padding: 14px 16px; font-size: 13px; font-weight: 700; letter-spacing: .01em; color: var(--ink); border-bottom: 1px solid var(--line-soft); }
.notif-empty { padding: 24px 16px; text-align: center; font-size: 13px; color: var(--ink-3); }
.notif-list { max-height: 360px; overflow-y: auto; }
.notif-item { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); transition: background var(--dur-fast) var(--ease-standard); }
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: var(--brand-tint); }
.notif-item > svg { color: var(--ink-3); flex: none; }
.notif-ic { width: 32px; height: 32px; border-radius: var(--radius-sm); flex: none; display: grid; place-items: center; background: var(--brand-soft); color: var(--brand-strong); }
.notif-body { flex: 1; min-width: 0; line-height: 1.35; }
.notif-body b { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.notif-body small { font-size: 11.5px; color: var(--ink-3); }
.icon-btn {
  width: 38px; height: 38px; border-radius: var(--radius); flex: none;
  border: 1px solid var(--line); background: var(--surface);
  display: grid; place-items: center; color: var(--ink-2);
  transition: background var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);
}
.icon-btn:hover { background: var(--brand-tint); border-color: var(--brand-soft); color: var(--brand-strong); }
.icon-btn svg { width: 19px; height: 19px; }

.page { padding: calc(var(--u)*4) calc(var(--u)*4) calc(var(--u)*9); max-width: 1280px; }

/* ---------- Page header ---------- */
.page-head { margin-bottom: calc(var(--u)*3); }
.page-title { font-size: var(--text-h2-size); font-weight: 700; letter-spacing: -.02em; line-height: 1.15; color: var(--ink); }
.page-desc { color: var(--ink-2); font-size: 15px; margin-top: 8px; max-width: 660px; line-height: 1.5; }

/* ---------- KPI strip ---------- */
.kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: calc(var(--u)*2); margin-bottom: calc(var(--u)*3); }
.kpi {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius-lg); padding: calc(var(--u)*2.25);
  box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; left: 0; top: calc(var(--u)*2.25); bottom: calc(var(--u)*2.25);
  width: 3px; border-radius: 3px; background: var(--kpi-accent, var(--brand));
}
.kpi-label { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--ink-3); white-space: nowrap; }
.kpi-value { font-size: 38px; font-weight: 700; letter-spacing: -.03em; margin-top: 8px; line-height: 1; }
.kpi-foot { font-size: 12.5px; color: var(--ink-2); margin-top: 10px; display: flex; align-items: center; gap: 7px; }
.kpi-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--kpi-accent, var(--brand)); flex: none; }

/* ---------- List card ---------- */
.list-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-xl2); box-shadow: var(--shadow-sm); overflow: hidden; }
.toolbar { display: flex; align-items: center; gap: 14px; padding: calc(var(--u)*1.75) calc(var(--u)*2.25); border-bottom: 1px solid var(--line-soft); }
.tabs { display: flex; gap: 3px; background: var(--brand-tint); padding: 4px; border-radius: var(--radius); }
.tab {
  padding: 8px 15px; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 600; color: var(--ink-2);
  display: flex; align-items: center; gap: 8px; transition: all var(--dur-fast) var(--ease-standard); white-space: nowrap;
}
.tab:hover { color: var(--ink); }
.tab.active { background: var(--surface); color: var(--brand-strong); box-shadow: var(--shadow-xs); }
.tab .cnt { font-size: 11px; font-weight: 700; background: var(--neutral-100); color: var(--ink-2); border-radius: var(--radius-pill); padding: 1px 7px; }
.tab.active .cnt { background: var(--brand-soft); color: var(--brand-strong); }

.search { margin-left: auto; position: relative; display: flex; align-items: center; }
.search svg { position: absolute; left: 13px; width: 16px; height: 16px; color: var(--ink-3); pointer-events: none; }
.search input {
  width: 280px; padding: 10px 12px 10px 38px; border-radius: var(--radius);
  border: 1px solid var(--line); background: var(--surface-2); font-size: 13.5px; color: var(--ink);
  transition: border-color var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard), width var(--dur-base) var(--ease-standard);
}
.search input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus-ring); background: var(--surface); width: 320px; }
.search input::placeholder { color: var(--ink-3); }

/* ---------- Table ---------- */
.tbl { width: 100%; border-collapse: collapse; }
.tbl thead th {
  text-align: left; font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide);
  text-transform: uppercase; color: var(--ink-3);
  padding: calc(var(--u)*1.5) calc(var(--u)*2.25); border-bottom: 1px solid var(--line-soft);
  white-space: nowrap; background: var(--surface-2);
}
.tbl thead th.num, .tbl tbody td.num { text-align: right; }
.tbl tbody td { padding: 0 calc(var(--u)*2.25); border-bottom: 1px solid var(--line-soft); height: var(--row-h); font-size: 14px; vertical-align: middle; }
.tbl tbody tr { cursor: pointer; transition: background var(--dur-fast) var(--ease-standard); }
.tbl tbody tr:hover { background: var(--brand-tint); }
.tbl tbody tr:last-child td { border-bottom: none; }

.merch-cell { display: flex; align-items: center; gap: 13px; }
.merch-logo {
  width: 38px; height: 38px; border-radius: var(--radius-sm); flex: none;
  display: grid; place-items: center; font-weight: 700; font-size: 13.5px; color: #fff; letter-spacing: -.02em;
}
.merch-name { font-weight: 600; color: var(--ink); white-space: nowrap; }
.merch-camp { font-size: 12.5px; color: var(--ink-3); white-space: nowrap; }

.cat-tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12px; font-weight: 600; color: var(--ink-2);
  background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-pill); padding: 4px 11px 4px 9px; white-space: nowrap;
}
.cat-ic { width: 14px; height: 14px; flex: none; -webkit-mask: var(--src) center / contain no-repeat; mask: var(--src) center / contain no-repeat; }

.cashback-val { font-weight: 700; color: var(--brand-strong); }

/* status pills — solid Lune chips, uppercase tracked */
.pill {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase;
  border-radius: var(--radius-pill); padding: 5px 12px 5px 10px; white-space: nowrap;
}
.pill .pdot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: currentColor; }
.pill.pending  { color: var(--st-pending-ink); background: var(--st-pending); }
.pill.live     { color: var(--st-live-ink); background: var(--st-live); }
.pill.live .pdot { background: #fff; animation: livepulse 1.8s var(--ease-standard) infinite; }
.pill.accepted { color: var(--st-accepted-ink); background: var(--st-accepted); }
.pill.completed{ color: var(--st-done-ink); background: var(--st-done); }
.pill.rejected { color: var(--st-rej-ink); background: var(--st-rej); }
@keyframes livepulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(255,255,255,.7); } 50%{ box-shadow: 0 0 0 4px rgba(255,255,255,0); } }

/* ---------- Pagination ---------- */
.pager { display: flex; align-items: center; gap: 14px; padding: calc(var(--u)*1.75) calc(var(--u)*2.25); }
.pager-info { font-size: 13px; color: var(--ink-3); }
.pager-info b { color: var(--ink-2); }
.pager-ctl { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.pg-btn { min-width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid transparent; color: var(--ink-2); font-size: 13px; font-weight: 600; display: grid; place-items: center; padding: 0 8px; }
.pg-btn:hover { background: var(--brand-tint); }
.pg-btn.active { background: var(--brand); color: #fff; }
.pg-btn:disabled { opacity: .35; cursor: default; }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: var(--radius);
  transition: background var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard), transform .05s, border-color var(--dur-fast) var(--ease-standard); white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn svg { width: 17px; height: 17px; }
.btn-primary { background: var(--brand); color: #fff; box-shadow: var(--shadow-xs); }
.btn-primary:hover { background: var(--brand-strong); box-shadow: var(--shadow-emerald); }
.btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
.btn-ghost:hover { background: var(--brand-tint); border-color: var(--brand-soft); }
.btn-danger { background: var(--surface); color: var(--st-rej); border: 1px solid color-mix(in srgb, var(--st-rej) 36%, var(--line)); }
.btn-danger:hover { background: var(--neg-bg); border-color: var(--st-rej); }
.btn-danger-solid { background: var(--st-rej); color: #fff; }
.btn-danger-solid:hover { filter: brightness(.95); }
.btn-lg { padding: 13px 24px; font-size: 15px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* ============================================================
   Detail view
   ============================================================ */
.detail-wrap { max-width: 1120px; }
.back-link { display: inline-flex; align-items: center; gap: 7px; font-size: 13.5px; font-weight: 600; color: var(--ink-2); margin-bottom: calc(var(--u)*2.5); padding: 6px 4px; border-radius: var(--radius-sm); white-space: nowrap; }
.back-link:hover { color: var(--brand-strong); }
.back-link svg { width: 16px; height: 16px; }

.detail-head { display: flex; align-items: flex-start; gap: 18px; margin-bottom: calc(var(--u)*3); }
.detail-head .merch-logo { width: 58px; height: 58px; border-radius: var(--radius); font-size: 20px; }
.dh-text { flex: 1; min-width: 0; }
.dh-title { font-size: var(--text-h4-size); font-weight: 700; letter-spacing: -.02em; display: flex; align-items: center; gap: 13px; flex-wrap: wrap; color: var(--ink); }
.dh-meta { display: flex; align-items: center; gap: 14px; color: var(--ink-2); font-size: 13.5px; margin-top: 9px; flex-wrap: wrap; }
.dh-meta > span { white-space: nowrap; }
.dh-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-3); flex: none; }
.dh-meta .mono { white-space: nowrap; }
.dh-actions { display: flex; gap: 10px; flex: none; }

.subtabs { display: flex; gap: 28px; border-bottom: 1px solid var(--line); margin-bottom: calc(var(--u)*3.5); }
.subtab { padding: 0 1px calc(var(--u)*1.75); font-size: 14px; font-weight: 600; color: var(--ink-3); position: relative; white-space: nowrap; }
.subtab:hover { color: var(--ink); }
.subtab.active { color: var(--brand-strong); }
.subtab.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2.5px; background: var(--brand); border-radius: 2px; }

.banner { display: flex; align-items: center; gap: 14px; padding: calc(var(--u)*2) calc(var(--u)*2.5); border-radius: var(--radius-lg); margin-bottom: calc(var(--u)*3); font-size: 14px; }
.banner svg { width: 20px; height: 20px; flex: none; }
.banner b { font-weight: 700; }
.banner-live { background: var(--brand-soft); color: var(--brand-strong); border: 1px solid color-mix(in srgb, var(--brand) 22%, transparent); }
.banner-done { background: var(--surface-muted); color: var(--ink); border: 1px solid var(--line); }
.banner-rej { background: var(--neg-bg); color: var(--neg); border: 1px solid color-mix(in srgb, var(--st-rej) 26%, transparent); }
.banner .audit { margin-left: auto; font-size: 12.5px; opacity: .85; text-align: right; line-height: 1.45; }

.section-label { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--ink-3); margin-bottom: calc(var(--u)*1.5); white-space: nowrap; }
.block { margin-bottom: calc(var(--u)*4); }

.summary-card {
  background: linear-gradient(140deg, var(--brand-soft), var(--surface) 70%);
  border: 1px solid color-mix(in srgb, var(--brand) 18%, transparent); border-radius: var(--radius-xl2);
  padding: calc(var(--u)*3.25); font-size: 19px; line-height: 1.55; color: var(--ink); letter-spacing: -.01em;
}
.summary-card b { color: var(--brand-strong); font-weight: 700; }

.term-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: calc(var(--u)*2); }
.term { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: calc(var(--u)*2.5); box-shadow: var(--shadow-sm); }
.term-label { font-size: 12px; font-weight: 600; color: var(--ink-3); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.term-label svg { width: 16px; height: 16px; color: var(--brand); }
.term-value { font-size: 28px; font-weight: 700; letter-spacing: -.025em; margin-top: 11px; color: var(--ink); }
.term-value small { font-size: 15px; font-weight: 600; color: var(--ink-3); }
.term-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 5px; }

.aud-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: calc(var(--u)*2.75); box-shadow: var(--shadow-sm); }
.aud-head { display: flex; align-items: center; gap: 16px; }
.aud-num { font-size: 33px; font-weight: 700; letter-spacing: -.03em; color: var(--ink); }
.aud-num small { font-size: 14px; color: var(--ink-3); font-weight: 600; }
.aud-bars { display: flex; gap: 4px; margin-left: auto; align-items: flex-end; height: 46px; }
.aud-bars i { width: 9px; background: var(--brand-soft); border-radius: 3px; display: block; }
.aud-bars i.on { background: var(--brand); }
.cond-list { margin-top: calc(var(--u)*2.25); display: flex; flex-direction: column; gap: 10px; }
.cond { display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 13px 16px; border-radius: var(--radius); background: var(--surface-2); border: 1px solid var(--line-soft); color: var(--ink); }
.cond svg { width: 17px; height: 17px; color: var(--brand); flex: none; }
.cond .ro { margin-left: auto; font-size: 11px; color: var(--ink-3); display: flex; align-items: center; gap: 5px; white-space: nowrap; }

/* metrics strip */
.metrics { display: grid; grid-template-columns: repeat(var(--mcols, 3), 1fr); gap: calc(var(--u)*2); }
.metric { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: calc(var(--u)*2.5); box-shadow: var(--shadow-sm); position: relative; }
.metric-label { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--ink-3); white-space: nowrap; }
.metric-value { font-size: 28px; font-weight: 700; letter-spacing: -.025em; margin-top: 10px; color: var(--ink); }
.metric-value small { font-size: 15px; color: var(--ink-3); font-weight: 600; }
.delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; margin-top: 10px; padding: 3px 10px; border-radius: var(--radius-pill); white-space: nowrap; }
.delta.up { color: var(--pos); background: var(--pos-bg); }
.delta.flat { color: var(--ink-2); background: var(--surface-muted); }
.metric-track { height: 6px; border-radius: 4px; background: var(--line-soft); margin-top: 15px; overflow: hidden; }
.metric-track i { display: block; height: 100%; border-radius: 4px; }

/* ---------- Decision footer ---------- */
.decision {
  position: sticky; bottom: 0; margin: 0 calc(var(--u)*-4) calc(var(--u)*-9);
  padding: calc(var(--u)*2.5) calc(var(--u)*4);
  background: color-mix(in srgb, var(--surface) 93%, transparent);
  backdrop-filter: blur(12px); border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 18px; box-shadow: 0 -8px 24px rgba(7,3,18,.05);
}
.decision-text .dl { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--warn); display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.decision-text .dl svg { width: 15px; height: 15px; }
.decision-text .ds { font-size: 13px; color: var(--ink-3); margin-top: 5px; }
.decision-actions { margin-left: auto; display: flex; gap: 12px; }

/* ============================================================
   Modal / overlay
   ============================================================ */
.overlay { position: fixed; inset: 0; z-index: 100; background: rgba(7,3,18,.45); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; padding: 24px; animation: fade var(--dur-base) var(--ease-standard); }
@keyframes fade { from { opacity: 0; } }

.modal { background: var(--surface); border-radius: var(--radius-xl2); width: 528px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); animation: pop var(--dur-slow) var(--ease-emphasis); }
@keyframes pop { from { opacity: 0; transform: translateY(14px) scale(.97); } }

.overlay.sheet { justify-content: flex-end; padding: 0; }
.overlay.sheet .modal { width: 484px; max-height: 100vh; height: 100vh; border-radius: 0; animation: slidein var(--dur-slow) var(--ease-emphasis); display: flex; flex-direction: column; }
@keyframes slidein { from { transform: translateX(100%); } }
.overlay.sheet .modal-body { flex: 1; }

.modal-head { padding: calc(var(--u)*3.25) calc(var(--u)*3.25) 0; display: flex; align-items: flex-start; gap: 14px; }
.modal-ico { width: 44px; height: 44px; border-radius: var(--radius); display: grid; place-items: center; flex: none; }
.modal-ico svg { width: 22px; height: 22px; }
.modal-ico.go { background: var(--brand-soft); color: var(--brand-strong); }
.modal-ico.stop { background: var(--neg-bg); color: var(--st-rej); }
.modal-title { font-size: 20px; font-weight: 700; letter-spacing: -.02em; color: var(--ink); }
.modal-sub { color: var(--ink-2); font-size: 14px; margin-top: 7px; line-height: 1.5; }
.modal-close { margin-left: auto; flex: none; width: 34px; height: 34px; border-radius: var(--radius-sm); display: grid; place-items: center; color: var(--ink-3); }
.modal-close:hover { background: var(--surface-muted); color: var(--ink); }
.modal-body { padding: calc(var(--u)*2.5) calc(var(--u)*3.25); }
.modal-foot { padding: calc(var(--u)*2) calc(var(--u)*3.25) calc(var(--u)*3.25); display: flex; gap: 12px; }
.modal-foot .btn { flex: 1; }

.recap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.recap-item { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 13px 15px; }
.recap-item .rl { font-size: 11px; font-weight: 700; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--ink-3); }
.recap-item .rv { font-size: 17px; font-weight: 700; margin-top: 5px; letter-spacing: -.01em; color: var(--ink); }
.recap-item.hl { background: var(--brand-soft); border-color: color-mix(in srgb, var(--brand) 20%, transparent); }
.recap-item.hl .rv { color: var(--brand-strong); }

.note { display: flex; gap: 11px; padding: 13px 15px; border-radius: var(--radius); font-size: 13px; line-height: 1.5; margin-top: calc(var(--u)*2.25); }
.note svg { width: 17px; height: 17px; flex: none; margin-top: 1px; }
.note.warn { background: var(--warn-bg); color: var(--warn); }
.note.info { background: var(--info-bg); color: var(--info); }

/* reject chips */
.chip-grid { display: flex; flex-wrap: wrap; gap: 9px; margin-top: calc(var(--u)*1.5); }
.chip { padding: 8px 15px; border-radius: var(--radius-pill); border: 1.5px solid var(--line); font-size: 13.5px; font-weight: 600; color: var(--ink-2); background: var(--surface); transition: all var(--dur-fast) var(--ease-standard); display: inline-flex; align-items: center; gap: 7px; }
.chip:hover { border-color: var(--ink-3); }
.chip.on { background: var(--neg-bg); border-color: var(--st-rej); color: var(--neg); }
.chip.on svg { width: 14px; height: 14px; }
.field-label { font-size: 13px; font-weight: 600; color: var(--ink); margin: calc(var(--u)*2.5) 0 8px; display: flex; align-items: center; gap: 6px; }
.field-label .opt { font-weight: 500; color: var(--ink-3); }
textarea.field { width: 100%; min-height: 96px; resize: vertical; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--radius); font-size: 14px; color: var(--ink); background: var(--surface-2); line-height: 1.5; }
textarea.field:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--focus-ring); background: var(--surface); }
textarea.field::placeholder { color: var(--ink-3); }

/* confirmation */
.confirm-wrap { max-width: 560px; margin: calc(var(--u)*6) auto 0; text-align: center; }
.confirm-ico { width: 80px; height: 80px; border-radius: var(--radius-xl2); display: grid; place-items: center; margin: 0 auto calc(var(--u)*3); }
.confirm-ico.ok { background: var(--brand-soft); color: var(--brand-strong); }
.confirm-ico.rej { background: var(--surface-muted); color: var(--ink-2); }
.confirm-ico svg { width: 42px; height: 42px; }
.confirm-title { font-size: 40px; line-height: 1.05; color: var(--ink); }
.confirm-sub { color: var(--ink-2); font-size: 16px; margin-top: 14px; line-height: 1.55; }
.confirm-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-xl2); box-shadow: var(--shadow-sm); padding: calc(var(--u)*2.75); margin: calc(var(--u)*4) 0; text-align: left; }
.confirm-row { display: flex; align-items: center; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--line-soft); }
.confirm-row:last-child { border-bottom: none; }
.confirm-row .cl { font-size: 13.5px; color: var(--ink-3); }
.confirm-row .cv { margin-left: auto; font-weight: 700; font-size: 14.5px; color: var(--ink); }
.confirm-actions { display: flex; gap: 12px; justify-content: center; }

/* cardholder preview */
.phone-wrap { display: flex; justify-content: center; padding: calc(var(--u)*2) 0; }
.phone { width: 322px; background: var(--lune-ink); border-radius: 44px; padding: 12px; box-shadow: var(--shadow-xl); position: relative; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

/* LuneHub shell: left nav + topbar. Exports window.Shell */
(function () {
  const { Icon } = window;
  const { useState, useEffect, useRef } = React;

  function Sidebar({ pendingCount, bankName, onHome }) {
    return (
      <aside className="sidebar">
        <a href="../index.html" title="Back to demo home" style={{ textDecoration: 'none', color: 'inherit', cursor: 'pointer' }}>
          <div className="brand-mark">
            <div className="brand-logo">
              <img src={(window.__resources && window.__resources['ds/brand/lune-icon-dark.svg']) || 'ds/brand/lune-icon-dark.svg'} alt="Lune" />
            </div>
            <div>
              <div className="brand-name">Lune</div>
              <div className="brand-sub">{bankName || 'Demo Environment'}</div>
            </div>
          </div>
        </a>

        <div className="nav-label">Products</div>
        <button className="nav-prod active nav-item" style={{ gap: 11 }} onClick={onHome}>
          <span className="prod-mark"><img src={(window.__resources && window.__resources['ds/brand/lune-icon-light.svg']) || 'ds/brand/lune-icon-light.svg'} alt="" /></span>
          Pulse
        </button>
        <button className="nav-item nav-child active" style={{ marginTop: 2 }} onClick={onHome}>
          Campaign Manager
          {pendingCount ? <span className="nav-badge">{pendingCount}</span> : null}
        </button>
      </aside>
    );
  }

  function Topbar({ crumbs, onCrumb, onSearch, notifications }) {
    const [open, setOpen] = useState(false);
    const wrapRef = useRef(null);
    useEffect(() => {
      function onDoc(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); }
      document.addEventListener('mousedown', onDoc);
      return () => document.removeEventListener('mousedown', onDoc);
    }, []);
    const n = notifications || [];
    return (
      <header className="topbar">
        <div className="crumbs">
          {crumbs.map((c, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span className="sep"><Icon name="chevR" size={13} /></span>}
              {i === crumbs.length - 1
                ? <b>{c}</b>
                : <button className="crumb-link" onClick={() => onCrumb && onCrumb(i)}>{c}</button>}
            </React.Fragment>
          ))}
        </div>
        <div className="topbar-actions">
          <button className="icon-btn" title="Search campaigns" onClick={onSearch}><Icon name="search" size={18} /></button>
          <div className="notif-wrap" ref={wrapRef}>
            <button className="icon-btn" title="Notifications" onClick={() => setOpen(o => !o)}>
              <Icon name="bell" size={18} />
              {n.length > 0 && <span className="notif-dot" />}
            </button>
            {open && (
              <div className="notif-pop">
                <div className="notif-head">Notifications</div>
                {n.length === 0 ? (
                  <div className="notif-empty">You’re all caught up.</div>
                ) : (
                  <div className="notif-list">
                    {n.map(item => (
                      <button key={item.id} className="notif-item" onClick={() => { setOpen(false); item.onClick(); }}>
                        <span className="notif-ic"><Icon name="inbox" size={16} /></span>
                        <span className="notif-body">
                          <b>{item.title}</b>
                          <small>{item.sub}</small>
                        </span>
                        <Icon name="chevR" size={15} />
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </header>
    );
  }

  function Shell({ crumbs, onCrumb, onHome, onSearch, notifications, pendingCount, bankName, children }) {
    return (
      <div className="app">
        <Sidebar pendingCount={pendingCount} bankName={bankName} onHome={onHome} />
        <main className="main">
          <Topbar crumbs={crumbs} onCrumb={onCrumb} onSearch={onSearch} notifications={notifications} />
          {children}
        </main>
      </div>
    );
  }

  Object.assign(window, { Shell });
})();

</script>
